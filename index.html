<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GIS FDT v5.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cd:#fff;--hd:#f5f7fa;--hd2:#eef2f8;
  --ac:#002868;--ac-soft:rgba(0,40,104,.08);
  --tx:#0e1828;--t2:#5a6478;--t3:#8b95a8;
  --bd:#d8dce4;--bd2:#e7ebf2;
  --gn:#2e7d52;--gn-soft:rgba(46,125,82,.12);
  --bl:#1f4e8c;--bl-soft:rgba(31,78,140,.12);
  --or:#c25c20;--or-soft:rgba(194,92,32,.12);
  --rd:#b83232;--rd-soft:rgba(184,50,50,.1);
  --b-gap:#002868;--b-ath:#7B5FA8;--b-on:#3B9BD8;--b-ba:#E0A800;--b-ba-tx:#3a2c00;
}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:#dfe5ef;color:var(--tx);min-height:100vh;font-size:16px}
button{font-family:inherit;cursor:pointer}
a{color:var(--ac)}

.app{max-width:1480px;margin:24px auto;background:var(--cd);border-radius:11px;overflow:hidden;border:1px solid #c7cfdb;box-shadow:0 8px 32px rgba(14,24,40,.12)}
.appbar{background:var(--cd);padding:12px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.appbar .brand{display:flex;align-items:center;gap:14px}
.appbar .logo{font-size:1.15em;font-weight:700;color:var(--tx)}
.appbar .logo em{color:var(--ac);font-style:normal;font-size:.78em;margin-left:5px;font-weight:600;background:var(--ac-soft);padding:2px 8px;border-radius:5px}
.appbar .right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.appbar .stats{font-size:.82em;color:var(--t2)}
.userchip{display:flex;align-items:center;gap:8px;padding:5px 11px;border-radius:9px;border:1px solid var(--bd);background:var(--cd);font-size:.85em;cursor:pointer}
.userchip.adm{background:var(--ac-soft);border-color:rgba(0,40,104,.2);color:var(--ac)}
.userchip b{font-weight:700}
.synced{font-weight:600}
.synced.ok{color:var(--gn)}
.synced.warn{color:var(--or)}
.synced.err{color:var(--rd)}
.synced.local{color:var(--t2)}

.mtabs{background:var(--cd);border-bottom:2px solid var(--bd);padding:0 24px;display:flex;gap:0;overflow-x:auto}
.mtab{padding:13px 26px;background:none;border:none;font-size:.95em;color:var(--t2);border-bottom:3px solid transparent;font-weight:500;margin-bottom:-2px;white-space:nowrap}
.mtab.a{color:var(--ac);border-bottom-color:var(--ac);font-weight:600;background:var(--ac-soft)}
.mtab:hover:not(.a){color:var(--tx);background:var(--hd)}
.mtab .cnt{margin-left:6px;background:rgba(184,50,50,.85);color:#fff;padding:1px 7px;border-radius:9px;font-size:.7em;font-weight:600}

.stabs{display:flex;gap:4px;margin-bottom:16px;background:var(--hd2);padding:5px;border-radius:9px;width:fit-content;border:1px solid var(--bd)}
.stab{padding:7px 16px;border:none;background:none;color:var(--t2);border-radius:6px;font-size:.85em;font-weight:500}
.stab.a{background:var(--ac);color:#fff;font-weight:600}

.body{padding:24px;background:var(--hd);min-height:600px}

.search-row{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.searchbox{flex:1;min-width:280px;position:relative}
.searchbox input{width:100%;padding:13px 14px 13px 42px;border:1px solid var(--bd);border-radius:9px;background:var(--cd);font-size:.98em;outline:none;font-family:inherit}
.searchbox input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-soft)}
.searchbox::before{content:"🔍";position:absolute;left:14px;top:50%;transform:translateY(-50%)}

.btn{padding:9px 16px;border:none;border-radius:7px;font-size:.88em;display:inline-flex;align-items:center;gap:6px;font-weight:600;background:var(--ac);color:#fff;font-family:inherit}
.btn:hover:not(:disabled){filter:brightness(1.1)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.s{background:var(--cd);color:var(--tx);border:1px solid var(--bd);font-weight:500}
.btn.s:hover{background:var(--hd2)}
.btn.outline{background:transparent;color:var(--ac);border:1px solid var(--ac)}
.btn.sm{padding:6px 11px;font-size:.8em}
.btn.lg{padding:12px 22px;font-size:.95em}
.btn.danger{background:var(--rd)}
.btn.gn{background:var(--gn)}

.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.bchip{padding:7px 13px;border-radius:18px;background:var(--cd);border:1px solid var(--bd);font-size:.85em;color:var(--t2);font-weight:500}
.bchip.a{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:600}
.bchip.own{background:rgba(59,155,216,.13);border-color:var(--b-on);color:var(--b-on);font-weight:600}
.bchip[role="button"]{cursor:pointer}
.filter-label{font-size:.82em;color:var(--t2);margin-right:6px;font-weight:500}
.sel-dd{padding:7px 13px;border-radius:7px;border:1px solid var(--bd);background:var(--cd);font-size:.85em;font-family:inherit;outline:none}

.bbadge{display:inline-block;padding:2px 9px;border-radius:9px;font-size:.74em;font-weight:600;color:#fff}
.bbadge.gap{background:var(--b-gap)}
.bbadge.athleta{background:var(--b-ath)}
.bbadge.on{background:var(--b-on)}
.bbadge.banana{background:var(--b-ba);color:var(--b-ba-tx)}

.sbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:.74em;font-weight:600}
.sbadge.act{background:var(--gn-soft);color:var(--gn)}
.sbadge.his{background:var(--bl-soft);color:var(--bl)}
.sbadge.rec{background:var(--or-soft);color:var(--or)}
.sbadge.empty{background:#f0eee6;color:#8a7848}

.welcome-grid{max-width:920px;margin:0 auto;padding:50px 24px}
.welcome-title{text-align:center;margin-bottom:36px}
.welcome-title h1{font-size:2.1em;margin-bottom:8px}
.welcome-title h1 em{color:var(--ac);font-style:normal}
.welcome-title p{color:var(--t2)}
.id-section{margin-bottom:30px}
.id-section-label{font-size:.82em;color:var(--t2);margin-bottom:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.id-brands{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.id-brand{background:var(--cd);border:2px solid var(--bd);border-radius:11px;padding:24px 16px;text-align:center;cursor:pointer;border-top-width:5px;transition:.15s}
.id-brand:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 6px 16px rgba(14,24,40,.08)}
.id-brand h3{font-size:1.25em;margin-bottom:4px;font-weight:700}
.id-brand p{font-size:.78em;color:var(--t2)}
.id-brand .tech{font-size:.78em;color:var(--t2);margin-top:6px}
.id-brand .tech b{color:var(--tx)}
.id-or{display:flex;align-items:center;gap:14px;margin:26px 0;color:var(--t2);font-size:.85em}
.id-or span{flex:1;height:1px;background:var(--bd)}
.id-member{background:var(--cd);border:2px solid var(--bd);border-radius:11px;padding:22px 28px;display:flex;align-items:center;gap:18px;cursor:pointer}
.id-member:hover{border-color:var(--ac)}
.id-member .ico{font-size:2em}
.id-member-text{flex:1}
.id-member-text h3{font-size:1.15em;font-weight:700;margin-bottom:3px}
.id-member-text p{color:var(--t2);font-size:.88em}

.q-display-bar{background:var(--cd);padding:11px 18px;border-radius:9px;font-size:.9em;display:flex;align-items:center;gap:12px;margin-bottom:18px;border:1px solid var(--bd);flex-wrap:wrap}
.q-display-bar .lab{color:var(--t2)}
.q-display-bar .val{font-weight:700;font-family:Consolas,monospace}
.q-display-bar .clr{margin-left:auto;color:var(--t2);font-size:.85em;cursor:pointer;background:none;border:none}

.style-header{background:var(--cd);border:1px solid var(--bd);border-radius:11px;padding:18px 22px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.style-header h2{font-size:1.35em;font-weight:700;font-family:Consolas,monospace;margin-bottom:6px}
.style-header .meta{font-size:.88em;color:var(--t2)}
.style-header .meta span{margin-right:14px}
.style-header .meta b{color:var(--tx);font-weight:600}
.style-header .right{text-align:right;font-size:.82em;color:var(--t2)}

.fab-layout{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
.fcard{background:var(--cd);border:1px solid var(--bd);border-radius:11px;padding:16px 18px}
.fcard.main{border-left:5px solid var(--ac)}
.fcard.acc{border-left:5px solid #94a3b8}
.fcard.acc.small{padding:13px 16px}
.fcard.sub-main{border-left:5px solid var(--or)}
.fcard .ftop{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.fcard .role{font-size:.82em;font-weight:700;color:var(--ac)}
.fcard.acc .role{color:#5a6478}
.fcard.sub-main .role{color:var(--or)}
.fcard .rd-line{font-size:1.05em;font-weight:700;font-family:Consolas,monospace}
.fcard.acc .rd-line{font-size:.95em}
.fcard .name{font-size:.9em;color:var(--tx);margin:2px 0 4px;font-weight:500}
.fcard .props{font-size:.85em;color:var(--t2);line-height:1.55}
.fcard .props b{color:var(--tx);font-weight:600}
.fcard .acts{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.acc-list{display:flex;flex-direction:column;gap:10px}
.acc-list-title{font-size:.82em;color:var(--t2);font-weight:600;margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}

.history-section{background:var(--cd);border:1px solid var(--bd);border-radius:11px;padding:14px 18px;margin-top:16px}
.history-section h4{font-size:.88em;color:var(--t2);margin-bottom:10px;font-weight:600}
.hist-row{display:grid;grid-template-columns:auto 1fr auto;gap:14px;padding:7px 0;border-top:1px dashed var(--bd2);font-size:.85em;color:var(--t2);align-items:center}
.hist-row:first-of-type{border-top:none}
.hist-row .dt{font-family:Consolas,monospace;font-size:.85em;color:var(--t3)}
.hist-row .desc{color:var(--tx)}

.rd-detail-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
.rd-detail-card{background:var(--cd);border:1px solid var(--bd);border-radius:11px;padding:22px 24px}
.rd-detail-card .head{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--bd2);flex-wrap:wrap}
.rd-detail-card .head h3{font-size:1.55em;font-family:Consolas,monospace;font-weight:700}
.rd-detail-card .sub{font-size:1.05em;font-weight:600;margin-bottom:6px}
.rd-detail-card .prop-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:.9em;line-height:1.6}
.rd-detail-card .prop-grid .k{color:var(--t2);font-weight:500}
.used-in-card{background:var(--cd);border:1px solid var(--bd);border-radius:11px;padding:18px}
.used-in-card h4{font-size:.92em;font-weight:700;margin-bottom:10px}
.used-in-tbl{width:100%;font-size:.87em;border-collapse:collapse}
.used-in-tbl th{text-align:left;color:var(--t2);padding:6px 8px;font-weight:600;font-size:.85em;border-bottom:1px solid var(--bd2)}
.used-in-tbl td{padding:8px;border-bottom:1px dashed var(--bd2);font-family:Consolas,monospace;font-size:.88em}
.used-in-tbl td:last-child{font-family:inherit;text-align:right;font-weight:600}

.admin-panel{background:var(--ac-soft);border:1px dashed var(--ac);border-radius:11px;padding:18px;margin-top:16px}
.admin-panel h4{font-size:.92em;font-weight:700;margin-bottom:10px;color:var(--ac)}
.admin-panel .acts{display:flex;gap:10px}
.admin-panel .acts .btn{flex:1;justify-content:center;padding:11px}
.admin-panel .hint{font-size:.78em;color:var(--t2);text-align:center;margin-top:8px}

.notfound-wrap{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
.notfound-card{background:var(--cd);border:1px solid var(--bd);border-radius:11px;padding:50px 30px;text-align:center}
.notfound-card .ico{font-size:3.5em;margin-bottom:12px;opacity:.85}
.notfound-card h3{font-size:1.35em;margin-bottom:8px;font-weight:700}
.notfound-card .why{color:var(--t2);font-size:.92em;line-height:1.7;max-width:440px;margin:0 auto 22px}
.notify-form{background:#fafbfd;border:1px solid var(--bd2);border-radius:9px;padding:18px;max-width:480px;margin:0 auto;text-align:left}
.notify-form .lbl{font-size:.85em;color:var(--t2);font-weight:600;margin-bottom:10px}
.notify-brands{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.notify-brand{padding:11px 8px;border:1px solid var(--bd);border-radius:7px;background:#fff;text-align:center;cursor:pointer;font-size:.85em;font-weight:600;border-top:3px solid}
.notify-brand.sel{box-shadow:0 0 0 2px var(--ac-soft) inset}
.notify-form textarea{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:6px;font-family:inherit;font-size:.88em;min-height:50px;outline:none;resize:vertical}
.notify-form .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.tips-card{background:var(--cd);border:1px solid var(--bd);border-radius:11px;padding:18px}
.tips-card h4{font-size:.92em;font-weight:700;margin-bottom:10px}
.tips-card ul{list-style:none}
.tips-card li{padding:8px 0;border-top:1px dashed var(--bd2);font-size:.88em;color:var(--t2);line-height:1.5}
.tips-card li:first-child{border-top:none}
.tips-card li b{color:var(--tx)}

.multi-results{background:var(--cd);border:1px solid var(--bd);border-radius:11px;overflow:hidden}
.multi-row{display:grid;grid-template-columns:24px 110px 90px 1fr auto;gap:14px;align-items:center;padding:11px 18px;border-top:1px solid var(--bd2);cursor:pointer}
.multi-row:first-child{border-top:none}
.multi-row:hover{background:#f4f9fc}
.multi-row .mr-marker{text-align:center}
.multi-row .mr-rd{font-family:Consolas,monospace;font-size:.92em}
.multi-row .mr-info{font-size:.87em;color:var(--t2);line-height:1.4;overflow:hidden}
.multi-row .mr-info b{color:var(--tx);font-weight:600}
.multi-row .mr-arrow{color:var(--t3);font-size:1.2em}

/* Library upload cards */
.lib-upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px}
.lib-card{background:var(--cd);border:1px solid var(--bd);border-radius:9px;padding:14px 16px}
.lib-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lib-card-title{font-weight:700;font-size:.95em;color:var(--ac)}
.lib-card-count{font-size:.8em;color:var(--t2);background:var(--hd2);padding:2px 9px;border-radius:9px;font-weight:600}
.lib-card .sel-dd{width:100%;margin-bottom:8px;font-size:.82em}
.lib-drop{border:2px dashed var(--bd);border-radius:7px;padding:18px 10px;text-align:center;cursor:pointer;font-size:.85em;color:var(--t2);transition:.15s}
.lib-drop:hover,.lib-drop.dragover{border-color:var(--ac);background:var(--ac-soft);color:var(--ac)}
.lib-drop input{display:none}
.lib-progress{margin-top:10px;font-size:.8em}
.lib-progress-bar{height:6px;background:var(--hd2);border-radius:3px;overflow:hidden;margin-top:4px}
.lib-progress-fill{height:100%;background:var(--ac);transition:width .3s}
.lib-progress.ok .lib-progress-fill{background:var(--gn)}
.lib-progress.err .lib-progress-fill{background:var(--rd)}

@media(max-width:680px){
  .lib-upload-grid{grid-template-columns:1fr}
}

.recent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.recent-card{background:var(--hd);padding:10px 13px;border-radius:8px;border:1px solid var(--bd2);cursor:pointer;font-size:.87em}
.recent-card .rc-style{font-family:Consolas,monospace;font-weight:700}
.recent-card .rc-meta{font-size:.78em;color:var(--t2);margin-top:2px}

/* Excel tab */
.drop{background:var(--cd);border:2px dashed var(--bd);border-radius:11px;padding:36px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:18px}
.drop.dragover{border-color:var(--ac);background:var(--ac-soft)}
.drop .ico{font-size:3em;opacity:.4;margin-bottom:8px}
.drop h3{color:var(--tx);font-size:1.05em;margin-bottom:6px}
.drop p{color:var(--t2);font-size:.88em}
.drop input{display:none}

.xl-summary{background:var(--cd);border:1px solid var(--bd);border-radius:11px;padding:16px 22px;margin-bottom:14px;display:grid;grid-template-columns:1fr repeat(5,auto) auto;gap:18px;align-items:center}
.xl-summary .fname{font-weight:700;font-size:1em}
.xl-summary .fmeta{font-size:.8em;color:var(--t2);margin-top:2px}
.stat{text-align:center}
.stat .n{font-size:1.55em;font-weight:700;line-height:1}
.stat.gn .n{color:var(--gn)}
.stat.or .n{color:var(--or)}
.stat.rd .n{color:var(--rd)}
.stat .l{font-size:.72em;color:var(--t2);margin-top:4px;letter-spacing:.3px;text-transform:uppercase}

.tbl-wrap{background:var(--cd);border:1px solid var(--bd);border-radius:11px;overflow:hidden}
.tbl-wrap table{width:100%;border-collapse:collapse;font-size:.87em}
.tbl-wrap thead th{background:var(--hd2);text-align:left;padding:10px 11px;font-weight:600;color:var(--t2);font-size:.82em;letter-spacing:.3px;text-transform:uppercase;border-bottom:2px solid var(--bd)}
.tbl-wrap tbody td{padding:11px;border-top:1px solid var(--bd2);vertical-align:top}
.tbl-wrap tbody tr.warn{background:#fff8ee}
.tbl-wrap tbody tr.committed{background:#f0f9f3}

.cell-style{font-family:Consolas,monospace;font-weight:700;font-size:.9em;white-space:nowrap}
.cell-bom{font-family:Consolas,monospace;font-size:.85em;color:var(--t2)}
.cell-cat{font-size:.76em;background:var(--hd2);padding:2px 7px;border-radius:4px;color:var(--t2);display:inline-block;font-weight:600}

.parsed-fab{display:grid;grid-template-columns:auto auto 1fr auto auto;gap:8px;align-items:center;font-size:.84em;margin-bottom:6px}
.parsed-fab:last-child{margin-bottom:0}
.parsed-fab .role-tag{font-size:.7em;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--ac-soft);color:var(--ac);text-align:center;min-width:34px}
.parsed-fab .role-tag.acc{background:rgba(100,116,139,.13);color:#586478}
.parsed-fab .role-tag.label-tag{background:rgba(123,95,168,.13);color:#7B5FA8}
.parsed-fab .rd-cell{font-family:Consolas,monospace;font-weight:600;min-width:78px}
.parsed-fab .rd-cell.empty{color:#aab2c2;font-style:italic;font-weight:500}
.parsed-fab .desc{color:var(--t2);overflow:hidden;text-overflow:ellipsis;max-width:340px}

.sub-select{padding:18px 22px;background:linear-gradient(to bottom,#dde9f3,#eef5fa);border-top:2px solid rgba(31,78,140,.25);border-bottom:2px solid rgba(31,78,140,.25)}
.sub-select h4{font-size:.95em;color:var(--bl);font-weight:700;margin-bottom:12px}
.orig-fabric-card{background:var(--cd);border:2px solid var(--or);border-radius:9px;padding:13px 16px;margin-bottom:12px}
.orig-fabric-card .lbl{font-size:.74em;color:var(--or);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.orig-fabric-card .rd{font-family:Consolas,monospace;font-weight:700;font-size:1em;margin-bottom:2px}
.orig-fabric-card .info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px 16px;margin-top:6px;font-size:.82em}
.orig-fabric-card .info-grid .k{color:var(--t2);font-size:.76em;font-weight:500}
.orig-fabric-card .info-grid .v{color:var(--tx);font-weight:600}

.sub-candidates{background:var(--cd);border:1px solid var(--bd);border-radius:9px;overflow:hidden}
.sub-cand{display:grid;grid-template-columns:auto 90px 1fr auto auto;gap:12px;align-items:center;padding:11px 14px;border-top:1px solid var(--bd2);cursor:pointer}
.sub-cand:first-child{border-top:none}
.sub-cand:hover{background:#f4f9fc}
.sub-cand.selected{background:#e6f1f8}
.sub-cand input[type="radio"]{width:18px;height:18px;cursor:pointer}
.sub-cand .rd{font-family:Consolas,monospace;font-weight:700;font-size:.93em}
.sub-cand .info{font-size:.84em;color:var(--t2)}
.sub-cand .info b{color:var(--tx);font-weight:600}
.sub-cand .score-pill{font-size:.76em;font-weight:700;padding:3px 9px;border-radius:11px;background:var(--gn-soft);color:var(--gn)}

<div id="toast" class="toast"></div>

<script>
'use strict';

// ============================================================
// CONFIG
// ============================================================
const CONFIG = {
  VERSION: '5.0.43',
  // 在 Part 4 部署後，把 Apps Script Web App URL 貼到下面這行的 '' 中間
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzkbgceu52JLAR8-CtZnBtOJkloQkGDOrOeQjWwZm-2iE6_9CyZWpxe_YH4zLcCIgGA/exec',
  STORAGE_PREFIX: 'gisfdt5:'
};

// ============================================================
// BRANDS
// ============================================================
const BRANDS = {
  gap:     { key:'gap',     name:'Gap',      tech:'Adia Chien',   color:'#002868', includes:'含 GO (Gap Outlet)' },
  athleta: { key:'athleta', name:'Athleta',  tech:'Jan Tu',       color:'#7B5FA8', includes:'' },
  on:      { key:'on',      name:'Old Navy', tech:'Yoko Yeh',     color:'#3B9BD8', includes:'' },
  banana:  { key:'banana',  name:'Banana',   tech:'Tinley Wang',  color:'#E0A800', includes:'含 BRFS' }
};
const BRAND_KEYS = ['gap','athleta','on','banana'];

// ============================================================
// STORAGE — local + cloud (Apps Script)
// ============================================================
const Store = {
  _key(k){ return CONFIG.STORAGE_PREFIX + k; },
  get(k){
    try{ const v = localStorage.getItem(this._key(k)); return v ? JSON.parse(v) : null; }
    catch(e){ console.error('Store.get',e); return null; }
  },
  set(k,v){
    try{ localStorage.setItem(this._key(k), JSON.stringify(v)); CloudSync.queue(k,v); return true; }
    catch(e){ console.error('Store.set',e); toast('儲存失敗：'+e.message,'rd'); return false; }
  },
  delete(k){ localStorage.removeItem(this._key(k)); CloudSync.queue(k,null,true); },
  list(prefix){
    const out = [], full = this._key(prefix||'');
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.startsWith(full)) out.push(k.slice(full.length));
    }
    return out;
  }
};

// CloudSync — sends writes to Apps Script if URL configured
const CloudSync = {
  status: 'local',          // 'local' | 'ok' | 'warn' | 'err'
  lastError: null,
  lastSyncAt: null,
  pendingQueue: [],
  syncLog: [],
  _flushTimer: null,

  enabled(){ return !!CONFIG.APPS_SCRIPT_URL; },

  queue(k, v, isDelete){
    if(!this.enabled()) return;
    // Dedupe：同一 key 已在隊列裡的丟掉，只留最新一筆。
    // 修了 v5.0.1-5 大量匯入時雲端產生重複的 bug
    this.pendingQueue = this.pendingQueue.filter(it => it.key !== k);
    this.pendingQueue.push({ key:k, value:v, isDelete:!!isDelete, ts:Date.now() });
    clearTimeout(this._flushTimer);
    this._flushTimer = setTimeout(() => this.flush(), 500);
  },

  async flush(){
    if(!this.enabled() || this.pendingQueue.length === 0) return;
    const batch = this.pendingQueue.splice(0);
    // Chunk 成 500 一批，避免 Apps Script 在大量匯入時 timeout
    const CHUNK = 500;
    const total = batch.length;
    let synced = 0;
    for(let i = 0; i < batch.length; i += CHUNK){
      const chunk = batch.slice(i, i + CHUNK);
      try{
        const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
          method:'POST',
          headers:{'Content-Type':'text/plain'},
          body: JSON.stringify({ action:'batchSet', items:chunk })
        });
        const json = await res.json();
        if(json.ok){
          synced += chunk.length;
          this.status = 'ok';
          this.lastError = null;
          this.lastSyncAt = new Date();
          this._log('ok', `已同步 ${synced}/${total} 筆`);
          if(State.currentTab === 'settings') renderTabContent();
        } else {
          this.status = 'err';
          this.lastError = json.error || '未知錯誤';
          this._log('err', `同步失敗 (${synced}/${total} 已完成)：${this.lastError}`);
          this.pendingQueue.unshift(...batch.slice(i)); // retry 剩下未完成的
          return;
        }
      }catch(err){
        this.status = 'err';
        this.lastError = err.message;
        this._log('err', `網路錯誤 (${synced}/${total} 已完成)：${err.message}`);
        this.pendingQueue.unshift(...batch.slice(i));
        return;
      }
    }
    if(State.currentTab === 'settings') renderTabContent();
  },

  _log(kind, msg){
    this.syncLog.unshift({ ts:new Date(), kind, msg });
    this.syncLog = this.syncLog.slice(0, 30);
  },

  async pull(){
    if(!this.enabled()) return;
    try{
      const res = await fetch(CONFIG.APPS_SCRIPT_URL + '?action=dump');
      const json = await res.json();
      if(json.ok && json.data){
        Object.entries(json.data).forEach(([k,v]) => {
          if(v !== null) localStorage.setItem(CONFIG.STORAGE_PREFIX + k, JSON.stringify(v));
        });
        this.status = 'ok';
        this._log('ok', `從雲端拉了 ${Object.keys(json.data).length} 筆資料`);
      }
    }catch(err){
      this.status = 'err';
      this.lastError = err.message;
      this._log('err', '拉取失敗：'+err.message);
    }
  }
};

// ============================================================
// SEED DATA (一次性，僅在 localStorage 是空的時候)
// ============================================================
const SEED_FABRICS = {
  'RD#179941': { rd:'RD#179941', brand:'on', type:'Knit', sub:'Single Jersey', composition:'100% Polyester', weight:null, width:'58"CW', shrinkage:'-2% / -2%', supplier:null, spandex:false, season:'SP 2027', notes:'' },
  'RD#154875': { rd:'RD#154875', brand:'on', type:'Woven', sub:'Lawn', composition:'100% Cotton (BCI)', weight:'75 g/m²', width:'52" CW', shrinkage:'-3.5% / -3.5%', supplier:'KAHATEX', spandex:false, season:'SP 2027', notes:'' },
  'RD#280646': { rd:'RD#280646', brand:'on', type:'Woven', sub:'Twill', composition:'100% Cotton', weight:'132 g/m²', width:'56/54"', shrinkage:'-3.5% / -3.5%', supplier:'KAHATEX', spandex:false, season:'SP 2027', notes:'' },
  'RD#1044974':{ rd:'RD#1044974',brand:'on', type:'Woven', sub:'Lawn', composition:'100% Cotton (BCI)', weight:'83 g/m²', width:'58/56"', shrinkage:'-3.5% / -3.5%', supplier:'KAHATEX', spandex:false, season:'SP 2027', notes:'' },
  'RD#1051702':{ rd:'RD#1051702',brand:'on', type:'Woven', sub:'Twill', composition:'100% Cotton (BCI)', weight:'106 g/m²', width:'58/60"', shrinkage:'-3.5% / -3.5%', supplier:'KAHATEX', spandex:false, season:'SP 2027', notes:'' },
  'RD#1051879':{ rd:'RD#1051879',brand:'on', type:'Woven', sub:'Twill', composition:'100% Cotton (BCI)', weight:'110 g/m²', width:'56/54"', shrinkage:'-3.5% / -3.5%', supplier:'KAHATEX', spandex:false, season:'SP 2027', notes:'' },
  'RD#1058674':{ rd:'RD#1058674',brand:'on', type:'Knit', sub:'Single Jersey', composition:'100% Cotton (BCI)', weight:'185 g/m²', width:'68" CW', shrinkage:'Iron -2% / -2%', supplier:'Kamhing', spandex:false, season:'Holiday 2026', notes:'實際偏垂' },
  'RD#1038140':{ rd:'RD#1038140',brand:'on', type:'Knit', sub:'Fleece', composition:'100% Polyester (rPET)', weight:'320 g/m²', width:'68" CW', shrinkage:'-3% / -3%', supplier:'Eclat', spandex:false, season:'FA 2026', notes:'' },
  'RD#1058692':{ rd:'RD#1058692',brand:'on', type:'Woven', sub:'Twill', composition:'100% Cotton (BCI)', weight:'98 g/m²', width:'56/54"', shrinkage:'-3.5% / -3.5%', supplier:'KAHATEX', spandex:false, season:'SP 2027', notes:'' }
};
const SEED_STYLES = {
  'D102978_BOM871681': {
    style:'D102978', bom:'871681', brand:'on', season:'SP 2027', category:'FR',
    description:'Pajama Set · LS PJ TOP + LONG PANTS', gender:'Boy',
    mainFabric:{ rd:'RD#179941', label:'上衣 Top' },
    accessories:[{ rd:'RD#179941', label:'褲子 Pants' },{ rd:'RD#179941', label:'領接 Neck Band' }],
    setBy:'Yoko Yeh', setDate:'2026/04/22'
  }
};
const SEED_HISTORY = [
  { ts:'2026/04/22 14:18', brand:'on', actor:'Yoko Yeh', action:'commit_main', style:'D102978_BOM871681', rd:'RD#179941', source:'excel:FR.xlsx' }
];
const DEFAULT_COMMENT_TEMPLATE =
`1.3D Fabric:
ACTUAL FABRIC
{actual_rd}
2.3D Tech – {tech_name}
3.Measurements Chart Link: 
4.Style Details: `;
const DEFAULT_SUBSTITUTE_TEMPLATE =
`1.3D Fabric:
SUBSTITUTE FABRIC
{actual_rd}
{actual_sub} / {actual_composition}
ACTUAL FABRIC
{original_rd}
2.3D Tech – {tech_name}
3.Measurements Chart Link: 
4.Style Details: `;

function seedIfEmpty(){
  if(Store.get('seeded')) return;
  Object.entries(SEED_FABRICS).forEach(([k,v]) => Store.set('fabric:'+k, v));
  Object.entries(SEED_STYLES).forEach(([k,v]) => Store.set('style:'+k, v));
  Store.set('history', SEED_HISTORY);
  Store.set('pendingRequests', []);
  Store.set('commentTemplate', DEFAULT_COMMENT_TEMPLATE);
  Store.set('substituteTemplate', DEFAULT_SUBSTITUTE_TEMPLATE);
  Store.set('seeded', true);
}

// 內容嗅探式 migration：偵測舊格式才替換。冪等（可重複跑）。
// 在 pull() 之前跟之後都會跑一次，避免雲端用舊格式覆蓋本機新格式。
function applyMigrations(){
  const cT = Store.get('commentTemplate') || '';
  const sT = Store.get('substituteTemplate') || '';
  // v5.0.1-3 舊預設留下的破格式特徵字串：'Used Actual Fabric' / 'Used substitute fabric' / 'Original specified:'
  if(cT === '' || cT.indexOf('Used Actual Fabric') >= 0){
    Store.set('commentTemplate', DEFAULT_COMMENT_TEMPLATE);
  }
  if(sT === '' || sT.indexOf('Used substitute fabric') >= 0 || sT.indexOf('Original specified:') >= 0){
    Store.set('substituteTemplate', DEFAULT_SUBSTITUTE_TEMPLATE);
  }
}

// ============================================================
// APP STATE
// ============================================================
const State = {
  user: null,
  currentTab: 'search',
  currentSubTab: 'search',
  search: { query:'', brand:'all', season:'all', type:'all', result:null },
  excel: { fileName:null, sheetName:null, headerIdx:0, cols:{}, rows:[], filter:'all', expandedRow:null, selectedCands:{} },
  history: { brand:'all', action:'all', searchQ:'' },
  settings: { section:'profile' }
};

function isAdmin(){ return State.user && State.user.role === 'admin'; }
function currentBrandKey(){ return State.user && State.user.brand; }

// ============================================================
// PARSING (從 Part 2 移過來)
// ============================================================
const SUB_TYPES = {
  knit:  ['Single Jersey','Double Jersey','Jersey','Fleece','Terry','French Terry','Pique','Rib','Interlock','Velour','Mesh','Sweat','Loopback','Ponte'],
  woven: ['Lawn','Twill','Plain Weave','Plain','Poplin','Sateen','Satin','Chambray','Oxford','Canvas','Lace','Voile','Dobby','Yarn Dyed','Y/D'],
  denim: ['Denim']
};
const ALL_SUB_TYPES = [].concat(...Object.values(SUB_TYPES));

// === SOP Subtype Families（從 KNIT.xlsx + WOVEN.xlsx 實際資料抓出，hardcoded） ===
// Knit 家族（split-on-dash 後的 family 名稱集合）
const KNIT_FAMILIES = [
  '4X2','Bonded','Boucle','Circular Knit','Corduroy','Crepe','Double Jacquard',
  'Double Jersey Jacquard','Double Knit','Drop Needle Rib','Flat Knit','Fleece',
  'Interlock','Jacquard','Jersey','Jersey Slub','Jersey Stretch','Knit','Lace',
  'Loop Terry','Melton','Mesh','Micro Fleece','Other: See Comment','Others',
  'Pique','Pointelle','Profleece','Raschel Knit','Rib','Sherpa','Single Jersey',
  'Single Jersey Jacquard','Terry','Thermal','Tricot','Tricot Knit','Velour',
  'Waffle','Warp Knit'
];
// Woven 家族
const WOVEN_FAMILIES = [
  'Bedford cord','Bonded','Broken','Canvas','Cavalry','Chambray','Chiffon',
  'Corduroy','Crepe','Dobby','Double Weave','Embroidery','Eyelet','Faille',
  'Faux Leather','Flannel','Gauze','Georgette','Herringbone','Houndstooth',
  'Jacquard','Lawn','Melton','Mesh','Organza','Others','Oxford','Pique',
  'Plain','Poplin','Satin','Seersucker','Swiss Dot Dobby','Taffeta',
  'Texture','Tricotine','Tweed','Twill','Velvet','Voile'
];
// 兩邊都有的家族（admin 查到這些要跳問）
const OVERLAP_FAMILIES = ['Bonded','Corduroy','Crepe','Jacquard','Melton','Mesh','Others','Pique'];

// Knit 同義組：同組內 family 互相當作 family-match
const KNIT_SYNONYM_GROUPS = {
  jersey:                 ['Jersey','Single Jersey','Single Jersey Jacquard','Jersey Slub','Jersey Stretch'],
  rib:                    ['Rib','Drop Needle Rib','4X2'],  // 加上 NxN regex (動態偵測)
  tricot:                 ['Tricot','Tricot Knit'],
  mesh:                   ['Mesh','Warp Knit'],
  fleece:                 ['Fleece','Micro Fleece','Profleece'],
  velour:                 ['Velour'],
  terry:                  ['Terry','Loop Terry'],
  interlock:              ['Interlock'],
  double_knit:            ['Double Knit'],
  double_jersey_jacquard: ['Double Jersey Jacquard'],
  warp_knit:              ['Warp Knit','Knit','Raschel Knit']
};
// 反向查表：family → 同義組 key
const KNIT_FAMILY_TO_GROUP = (() => {
  const m = {};
  Object.entries(KNIT_SYNONYM_GROUPS).forEach(([groupKey, fams]) => {
    fams.forEach(f => m[f.toLowerCase()] = groupKey);
  });
  return m;
})();
function isRibPattern(s){ return /^\d+\s*[xX]\s*\d+$/.test((s||'').trim()); }
function getKnitFamily(subtype){
  if(!subtype) return null;
  const t = subtype.trim();
  if(isRibPattern(t)) return 'Rib';
  // 用 startsWith 找 family（長到短、優先匹配長的、case insensitive）— 比 split('-')[0] 對各種格式更穩
  const sorted = [...KNIT_FAMILIES].sort((a, b) => b.length - a.length);
  for(const fam of sorted){
    if(t.toLowerCase().startsWith(fam.toLowerCase())) return fam;
  }
  // 還是找不到、退回 split('-')[0]
  return t.split(/[-–—]/)[0].trim();
}
function getWovenFamily(subtype){
  if(!subtype) return null;
  const t = subtype.trim();
  const sorted = [...WOVEN_FAMILIES].sort((a, b) => b.length - a.length);
  for(const fam of sorted){
    if(t.toLowerCase().startsWith(fam.toLowerCase())) return fam;
  }
  return t.split(/[-–—]/)[0].trim();
}

// 從一段文字（例 "POWERSOFT - RPET Interlock Piece Dye"）掃出已知的 family
// 規則：取最長 match；若多個無法歸併的 family 同時出現（例 "Fleece-look Jersey"），回 null 不猜
function extractSubFromText(text){
  if(!text) return null;
  const t = String(text).trim();
  const all = [...new Set([...KNIT_FAMILIES, ...WOVEN_FAMILIES])].sort((a,b) => b.length - a.length);
  const found = [];
  for(const fam of all){
    const esc = fam.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('\\b' + esc + '\\b', 'i');
    if(re.test(t)){
      // 若已有更長的 match 涵蓋這個 family、跳過（避免 "Single Jersey" 又加 "Jersey"）
      if(!found.some(f => f.toLowerCase().includes(fam.toLowerCase()))){
        found.push(fam);
      }
    }
  }
  if(found.length === 1) return found[0];
  return null;  // 0 個或 2+ 個歧義都回 null
}
function getKnitSynonymGroup(family){
  if(!family) return null;
  return KNIT_FAMILY_TO_GROUP[family.toLowerCase()] || family.toLowerCase();
}
// classifyType: 給一個 subtype 字串，判定屬於 Knit/Woven/Denim/兩個都有/不知道
function classifyType(subtype){
  if(!subtype) return 'unknown';
  const t = subtype.trim();
  if(isRibPattern(t)) return 'knit';  // NxN = Rib (Knit)
  const family = t.split(/[-–]/)[0].trim().toLowerCase();
  const inKnit  = KNIT_FAMILIES.some(f => f.toLowerCase() === family);
  const inWoven = WOVEN_FAMILIES.some(f => f.toLowerCase() === family);
  if(inKnit && inWoven) return 'both';
  if(inKnit) return 'knit';
  if(inWoven) return 'woven';
  return 'unknown';
}
const ALL_SUB_TYPES_PARSE = [...new Set([...KNIT_FAMILIES, ...WOVEN_FAMILIES])];  // 用於 parseFields 偵測 sub

const SUPPLIERS = ['KAHATEX','EMTEX','TEXOLA','Kamhing','KAMHING','Eclat','ECLAT','Toray','TORAY','Carvico','CARVICO','Lai Tai','Pongtai','Wing Lap','Kintex','KINTEX'];

function parseMainCell(text){
  if(!text) return [];
  const lines = String(text).split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  if(lines.length === 0) return [];
  const fabrics = [];
  let current = null;
  for(const line of lines){
    const labelMatch = line.match(/^([\u4e00-\u9fff]+(?:\s+[\u4e00-\u9fff]+)*?)\s*[:：]\s*(.*)$/);
    if(labelMatch){
      if(current) fabrics.push(finalizeFabric(current));
      current = { role:labelMatch[1].trim(), labelFormat:true, raw:line };
      parseFields(current, labelMatch[2]);
      continue;
    }
    const rdAtStart = line.match(/^RD#?\s*(\d{3,})\b/i);
    if(rdAtStart){
      if(current) fabrics.push(finalizeFabric(current));
      current = { role:null, labelFormat:false, raw:line };
      parseFields(current, line);
      continue;
    }
    // 開頭裸數字 + 逗號（例 BAC 格式：'1068277, Fleece, 80% Cotton...'）
    const bareNumAtStart = line.match(/^\s*(\d{5,})\s*[,，]/);
    if(bareNumAtStart){
      if(current) fabrics.push(finalizeFabric(current));
      current = { role:null, labelFormat:false, raw:line, rd:'RD#'+bareNumAtStart[1] };
      parseFields(current, line);
      continue;
    }
    const rdAnywhere = line.match(/(?:^|[\s,])RD#?\s*(\d{3,})\b/i);
    if(rdAnywhere && !current){
      current = { role:null, labelFormat:false, raw:line };
      parseFields(current, line);
      continue;
    }
    if(current){
      current.raw += '\n' + line;
      parseFields(current, line, true);
    } else {
      current = { role:null, labelFormat:false, raw:line, rdMissing:true };
      parseFields(current, line);
    }
  }
  if(current) fabrics.push(finalizeFabric(current));
  return fabrics;
}

function parseFields(f, text){
  if(!f.rd){
    const m = text.match(/RD#?\s*(\d{3,})/i);
    if(m) f.rd = 'RD#' + m[1];
  }
  // 文字開頭裸數字 + 逗號（例 "主料: 1068277, Fleece, ..."）
  if(!f.rd){
    const m = text.match(/^\s*(\d{5,})\s*[,，]/);
    if(m) f.rd = 'RD#' + m[1];
  }
  if(!f.composition){
    // 抓所有「nn% Fiber Name」段落，允許多字纖維名（例 Polyester Conventional / Elastane Conventional Spandex）
    // 一個段落結束於：下一個 nn% / 逗號 / 不接 % 的數字（如重量）/ 字串結尾
    const re = /(\d+(?:\.\d+)?)\s*%\s*([A-Za-z\(][A-Za-z\s\(\)\-]*?)(?=\s*[,，\/]|\s*\d|\s*$)/g;
    const segs = [];
    let m;
    while((m = re.exec(text)) !== null){
      const pct = m[1];
      const fiber = m[2].trim();
      if(fiber) segs.push(pct + '% ' + fiber);
    }
    if(segs.length > 0){
      f.composition = segs.join(' / ');
    }
  }
  if(!f.weight){
    // 抓 g/m² 系列：280 g/m2、280gsm、280gm、280 g m2、280 g/m² 等
    const wm = text.match(/(\d+(?:\.\d+)?)\s*(?:g\s*\/\s*m\s*[²2]|gsm|gm|g\s*m\s*[²2])(?=$|[\s,，.;)\]、/])/i);
    if(wm){ f.weight = wm[1] + ' g/m²'; }
    else {
      // 抓 oz 系列：4.5 oz/yd、4.5oz/yd2、4.5 osy → 換算成 gsm (×33.906)
      const om = text.match(/(\d+(?:\.\d+)?)\s*(?:oz\s*\/?\s*s?q?\s*y(?:d|ard)?\s*[²2]?|osy)(?=$|[\s,，.;)\]、/])/i);
      if(om){
        const gsm = Math.round(parseFloat(om[1]) * 33.906);
        f.weight = gsm + ' g/m²';
        f.weightSrcOz = om[1] + ' oz/yd²';  // 保留原 oz 值供 reference
      }
    }
  }
  if(!f.width){
    const m = text.match(/(\d{2,3}(?:\.\d+)?(?:\s*[\/x]\s*\d{2,3}(?:\.\d+)?)?)\s*(?:"|in\b)\s*(CW|cw)?/i);
    if(m) f.width = m[1].replace(/\s+/g,'') + '"' + (m[2] ? ' '+m[2].toUpperCase() : '');
  }
  if(!f.shrinkage){
    const m1 = text.match(/(-?\d+(?:\.\d+)?)\s*%\s*\/\s*(-?\d+(?:\.\d+)?)\s*%/);
    const m2 = !m1 && text.match(/(-?\d+(?:\.\d+)?)\s*\*\s*(-?\d+(?:\.\d+)?)/);
    if(m1) f.shrinkage = m1[1]+'% / '+m1[2]+'%';
    else if(m2) f.shrinkage = m2[1]+'% / '+m2[2]+'%';
  }
  if(!f.sub){
    // 依長度排序：先匹配「Single Jersey Jacquard」再匹配「Single Jersey」再匹配「Jersey」
    const sortedFams = [...ALL_SUB_TYPES_PARSE].sort((a,b) => b.length - a.length);
    for(const sub of sortedFams){
      const re = new RegExp('\\b' + sub.replace(/[\/\\]/g,'\\$&') + '\\b','i');
      if(re.test(text)){
        f.sub = sub;
        // 根據 classifyType 決定 f.type
        const cls = classifyType(sub);
        if(cls === 'knit') f.type = 'Knit';
        else if(cls === 'woven') f.type = 'Woven';
        // cls === 'both' 不設 type — 留給後續 findCandidates 處理
        break;
      }
    }
    // 也偵測 NxN（Rib）
    if(!f.sub){
      const ribM = text.match(/\b(\d+\s*[xX]\s*\d+)\b/);
      if(ribM){ f.sub = ribM[1]; f.type = 'Knit'; }
    }
  }
  if(!f.supplier){
    for(const s of SUPPLIERS){ if(new RegExp('\\b'+s+'\\b').test(text)){ f.supplier = s; break; } }
  }
}

function finalizeFabric(f){
  f.rdMissing = !f.rd;  // 一律以 f.rd 是否存在來決定，避免之前 pre-set 沒清掉
  return f;
}

function determineStatus(parsedFab){
  if(!parsedFab.rd) return { status:'empty' };
  const lib = Store.get('fabric:'+parsedFab.rd);
  if(lib){
    // 用公檔的資料補足 BOM cell 沒寫的欄位（特別是 sub 跟 type）
    const enriched = {};
    if(!parsedFab.sub && lib.sub) enriched.sub = lib.sub;
    if(!parsedFab.type && lib.type) enriched.type = lib.type;
    if(!parsedFab.composition && lib.composition) enriched.composition = lib.composition;
    if(!parsedFab.weight && lib.weight) enriched.weight = lib.weight;
    if(!parsedFab.width && lib.width) enriched.width = lib.width;
    if(!parsedFab.supplier && lib.supplier) enriched.supplier = lib.supplier;
    return { status:'actual', fromLib:lib, ...enriched };
  }
  return { status:'recommend' };
}

// ============================================================
// SOP-based scoring (matches v4.38 SOP Rules, priority order)
//   Hard Filters: 1.Type  2.Spandex
//   Scoring: 3.Subtype +40  4.Weight +30 (±15%)  5.Composition +45
//   5b. Group A Fallback (Cotton↔Polyester↔Rayon when <5 results)
//   6. Chemical Finish +10   6b. Mechanical Finish +10
// ============================================================
const GROUP_A_FIBERS = ['COTTON', 'POLYESTER', 'RAYON', 'VISCOSE']; // Rayon = Viscose
const SP_KEYWORDS = /\b(SPANDEX|ELASTANE|LYCRA|ELASTIC|SPAN|EL|SP)\b|彈性/i;

function detectSpandex(f){
  if(f && typeof f._spandexOverride === 'boolean') return f._spandexOverride;
  if(typeof f.spandex === 'boolean') return f.spandex;
  if(f.composition && SP_KEYWORDS.test(f.composition)) return true;
  return false;
}

function parsePrimaryFiber(comp){
  if(!comp) return null;
  const m = comp.match(/(\d+(?:\.\d+)?)\s*%\s*([A-Za-z][\w\u4e00-\u9fff]*)/);
  if(!m) return null;
  const fiber = m[2].toUpperCase().replace(/\(.*\)/,'').trim();
  return { fiber, pct: parseFloat(m[1]) };
}

function inGroupA(fiber){ return GROUP_A_FIBERS.includes(fiber); }

// ============================================================
// SOP-based fabric search (Gap Inc Substitute Fabric SOP v10.2025)
// 6-step flow:
//   1. Type filter (Knit/Woven/Denim — hardcoded from KNIT/WOVEN Excel families)
//   2. Spandex filter (hard — with/without must match)
//   3. Subtype filter (family-level, Knit 用同義組、Woven 嚴格)
//   4. Weight ±15% (hard; 0 結果才放寬到 ±20%)
//   5. Composition (with-sp ±5% / without-sp ±10%; 多出纖維 >5% 不通過)
//   5b. Group A fallback (Cotton↔Polyester↔Rayon 永遠跑、排後面)
//   6. Finish sort (no-finish 排前、has-finish 排後)
// ============================================================

// 解析 composition 字串成 [{fiber, pct}] — 用於精細比對
function parseComposition(comp){
  if(!comp) return [];
  const out = [];
  // 多個「nn% Fiber」格式並列，可能用 / 或 , 或空白分隔
  const re = /(\d+(?:\.\d+)?)\s*%\s*([^,\/\d%]+?)(?=\s*(?:\d+(?:\.\d+)?\s*%|[,\/]|$))/g;
  let m;
  while((m = re.exec(comp)) !== null){
    const fiber = normalizeFiber(m[2]);
    if(fiber) out.push({ fiber, pct: parseFloat(m[1]) });
  }
  return out;
}
function normalizeFiber(name){
  if(!name) return '';
  // 先看有沒有括號內容當備用（例 "(BCI)" → "BCI"）
  const parenInner = (name.match(/\(([^)]+)\)/)||[])[1];
  // 移除括號內容
  let cleaned = name.replace(/\([^)]*\)/g,'').trim();
  if(!cleaned && parenInner) cleaned = parenInner.trim();
  // 別名 + 已知 fiber map（key 是 upper case、value 是 normalized fiber name）
  const aliases = {
    'COTTON':'COTTON','POLYESTER':'POLYESTER','RAYON':'RAYON','SPANDEX':'SPANDEX',
    'NYLON':'NYLON','WOOL':'WOOL','LINEN':'LINEN','LYOCELL':'LYOCELL',
    'MODAL':'MODAL','ACRYLIC':'ACRYLIC','SILK':'SILK','HEMP':'HEMP','METALLIC':'METALLIC',
    'VISCOSE':'RAYON','BCI':'COTTON','PIMA':'COTTON','SUPIMA':'COTTON',
    'EL':'SPANDEX','SP':'SPANDEX','SPAN':'SPANDEX','SPX':'SPANDEX','LYCRA':'SPANDEX','ELASTANE':'SPANDEX','ELASTIC':'SPANDEX',
    'POLY':'POLYESTER','PES':'POLYESTER','PET':'POLYESTER','PA':'NYLON','POLYAMIDE':'NYLON','TENCEL':'LYOCELL',
    'RAY':'RAYON','COT':'COTTON','CO':'COTTON'
  };
  // 逐個 word 看哪個是已知 fiber（這樣 "US Cotton" 會找到 Cotton、"Modal Lenzing TENCEL" 會找到 Modal）
  const words = cleaned.split(/\s+/).filter(Boolean);
  for(const w of words){
    const upper = w.toUpperCase().replace(/[^A-Z]/g,'');
    if(aliases[upper]) return aliases[upper];
  }
  // 都沒找到、用第一個 word（fallback）
  return (words[0]||'').toUpperCase();
}
function isSpandexFiber(fiber){ return normalizeFiber(fiber) === 'SPANDEX'; }
function inGroupA(fiber){
  const norm = normalizeFiber(fiber);
  return GROUP_A_FIBERS.includes(norm);
}

// 比對單一候選的 composition 是否通過篩選
//   回傳 { ok:bool, groupA:bool, reason:string }
function checkComposition(queryFibers, candFibers, tol, allowGroupA){
  if(queryFibers.length === 0) return { ok:true, groupA:false };
  const usedCand = new Set();
  let usedGroupA = false;
  for(const qf of queryFibers){
    if(isSpandexFiber(qf.fiber)) continue;  // spandex 在 Step 2 處理
    let matchIdx = -1;
    // 先找完全同纖維
    for(let i = 0; i < candFibers.length; i++){
      if(usedCand.has(i)) continue;
      const cf = candFibers[i];
      if(isSpandexFiber(cf.fiber)) continue;
      if(cf.fiber === qf.fiber && Math.abs(cf.pct - qf.pct) <= tol * 100){
        matchIdx = i;
        break;
      }
    }
    // 沒同纖維 + 允許 Group A → 找 Group A 替代
    if(matchIdx < 0 && allowGroupA && inGroupA(qf.fiber)){
      for(let i = 0; i < candFibers.length; i++){
        if(usedCand.has(i)) continue;
        const cf = candFibers[i];
        if(isSpandexFiber(cf.fiber)) continue;
        if(inGroupA(cf.fiber) && Math.abs(cf.pct - qf.pct) <= tol * 100){
          matchIdx = i;
          usedGroupA = true;
          break;
        }
      }
    }
    if(matchIdx < 0) return { ok:false, groupA:false, reason:`找不到對應 ${qf.fiber} 的 ${qf.pct}%（容差 ${(tol*100).toFixed(0)}%）` };
    usedCand.add(matchIdx);
  }
  // 檢查候選有沒有 query 沒指定的「多出纖維」>5%
  for(let i = 0; i < candFibers.length; i++){
    if(usedCand.has(i)) continue;
    const cf = candFibers[i];
    if(isSpandexFiber(cf.fiber)) continue;
    if(cf.pct > 5) return { ok:false, groupA:false, reason:`候選多出 ${cf.fiber} ${cf.pct}%（>5% 不通過）` };
  }
  return { ok:true, groupA:usedGroupA };
}

// Group A 合併模式：query 的 Group A 加總 vs cand 的 Group A 加總
// 用在 query 有 2+ 個 Group A 纖維（例 56% Rayon + 39% Poly = 95% Group A）
// 想對到 cand 把這些合在一個纖維（例 95% Cotton + 5% Spandex）
// 容差用百分點（5 = ±5pp）
function checkCompositionGroupAUnified(queryFibers, candFibers, tol){
  const qNonSp = queryFibers.filter(f => !isSpandexFiber(f.fiber));
  if(qNonSp.length === 0) return false;
  const qGroupASum = qNonSp.filter(f => inGroupA(f.fiber)).reduce((s, f) => s + f.pct, 0);
  if(qGroupASum < 50) return false;  // query 的 Group A 太少、不適用合併模式
  // 候選不能有 >5% 的非 Group A 非 spandex 纖維
  const cNonSp = candFibers.filter(f => !isSpandexFiber(f.fiber));
  for(const cf of cNonSp){
    if(!inGroupA(cf.fiber) && cf.pct > 5) return false;
  }
  // 雙方 Group A 加總要近（百分點容差）
  const cGroupASum = cNonSp.filter(f => inGroupA(f.fiber)).reduce((s, f) => s + f.pct, 0);
  return Math.abs(cGroupASum - qGroupASum) <= tol * 100;
}

// 主入口
// 回傳 { needsDisambiguation: bool, subtype, candidates: [{fab, info, groupA, weightRelaxed, subRank}] }
function findCandidates(parsedFab, limit=50){
  const all = Store.list('fabric:').map(k => Store.get('fabric:'+k)).filter(Boolean);
  const diag = { total: all.length, afterType: 0, afterSpandex: 0, afterSub: 0, afterWeight: 0, strictPass: 0, groupAPass: 0 };

  // === Step 1: Type ===
  let queryType = parsedFab.type;  // 可能是 'Knit' / 'Woven' / 'Denim' / null
  let needsDisambig = false;
  if(!queryType && parsedFab.sub){
    const cls = classifyType(parsedFab.sub);
    if(cls === 'knit') queryType = 'Knit';
    else if(cls === 'woven') queryType = 'Woven';
    else if(cls === 'both'){
      // 8 個 overlap family 之一 — 需要 admin 選
      needsDisambig = true;
    }
  }
  if(needsDisambig){
    return { needsDisambiguation:true, subtype:parsedFab.sub, candidates:[], diag };
  }
  let pool = all;
  if(queryType){
    pool = pool.filter(c => !c.type || c.type.toLowerCase() === queryType.toLowerCase());
  }
  diag.afterType = pool.length;

  // === Step 2: Spandex ===
  if(parsedFab.composition || typeof parsedFab.spandex === 'boolean'){
    const querySpx = detectSpandex(parsedFab);
    pool = pool.filter(c => {
      if(!c.composition && typeof c.spandex !== 'boolean') return true;  // 沒資料保留
      return detectSpandex(c) === querySpx;
    });
  }
  diag.afterSpandex = pool.length;

  // === Step 3: Subtype (Family-level + 排序) ===
  let subRankFn = () => 99;
  if(parsedFab.sub){
    const queryFam = (queryType === 'Woven' ? getWovenFamily : getKnitFamily)(parsedFab.sub);
    const querySynGroup = queryType === 'Knit' ? getKnitSynonymGroup(queryFam) : queryFam.toLowerCase();
    pool = pool.filter(c => {
      if(!c.sub) return false;  // 必須有 subtype 資料
      const candFam = (queryType === 'Woven' ? getWovenFamily : getKnitFamily)(c.sub);
      if(!candFam) return false;
      if(queryType === 'Knit'){
        return getKnitSynonymGroup(candFam) === querySynGroup;
      }
      // Woven 嚴格 family 比對
      return candFam.toLowerCase() === queryFam.toLowerCase();
    });
    // Rank: A 完全一致 > B 同 family + keyword 重疊 > C 純 family 相同 > D 同義組
    subRankFn = (c) => {
      if(!c.sub) return 99;
      const cs = c.sub.trim().toLowerCase();
      const qs = parsedFab.sub.trim().toLowerCase();
      if(cs === qs) return 0;  // A 完全相等
      const candFam = (queryType === 'Woven' ? getWovenFamily : getKnitFamily)(c.sub);
      const sameFam = candFam && candFam.toLowerCase() === queryFam.toLowerCase();
      if(sameFam){
        // 有 keyword 重疊？
        const qWords = qs.split(/[\s\-–]+/).filter(Boolean);
        const cWords = cs.split(/[\s\-–]+/).filter(Boolean);
        if(qWords.some(w => cWords.includes(w))) return 1;  // B 同 family + keyword
        return 2;  // C 純同 family
      }
      return 3;  // D 同義組（Knit only）
    };
  }
  diag.afterSub = pool.length;

  // === Step 4: Weight ±15%，0 結果才放寬到 ±20% ===
  let weightRelaxed = false;
  let weightKilledAll = false;
  const poolBeforeWeight = pool.slice();  // 保留 Step 3 結果、Step 5c 救命用
  const queryWt = numFromStr(parsedFab.weight);
  if(queryWt && queryWt > 0){
    const filter15 = pool.filter(c => {
      const cw = numFromStr(c.weight);
      if(!cw) return false;
      return Math.abs(cw - queryWt) / queryWt <= 0.15;
    });
    if(filter15.length > 0){
      pool = filter15;
    } else {
      // 放寬到 ±20%
      pool = pool.filter(c => {
        const cw = numFromStr(c.weight);
        if(!cw) return false;
        return Math.abs(cw - queryWt) / queryWt <= 0.20;
      });
      if(pool.length > 0) weightRelaxed = true;
      else weightKilledAll = true;
    }
    // diag：重量資料完整度
    const withWt = poolBeforeWeight.filter(c => numFromStr(c.weight));
    const withoutWt = poolBeforeWeight.length - withWt.length;
    diag.weightStats = { withWt: withWt.length, withoutWt };
    // 重量壞光的時候、抓一些樣本給 user 看
    if(weightKilledAll){
      diag.weightSamples = poolBeforeWeight.slice(0, 10).map(c => ({
        rd: c.rd, weight: c.weight || '(空)', sub: c.sub
      }));
    }
  }
  diag.afterWeight = pool.length;

  // === Step 5: Composition (strict pass + Group A pass) ===
  const queryFibers = parseComposition(parsedFab.composition || '');
  const hasSpx = detectSpandex(parsedFab);
  const tol = hasSpx ? 0.05 : 0.10;
  let strictPass = pool;
  let groupAPass = [];
  if(queryFibers.length > 0){
    strictPass = pool.filter(c => checkComposition(queryFibers, parseComposition(c.composition||''), tol, false).ok);
    // Group A pass：strict 沒通過、但 Group A 替代後通過的
    const strictRds = new Set(strictPass.map(c => c.rd));
    groupAPass = pool.filter(c => {
      if(strictRds.has(c.rd)) return false;  // 排除已在 strict 的
      const r = checkComposition(queryFibers, parseComposition(c.composition||''), tol, true);
      return r.ok && r.groupA;
    });
  }
  diag.strictPass = strictPass.length;
  diag.groupAPass = groupAPass.length;

  // === Step 5b': Group A 合併 — 加總對應、容許不同 fiber 分布（例 56R/39P → 95Cot 或 95Poly）===
  let groupAUnifiedPass = [];
  if(queryFibers.length > 0){
    const usedRds = new Set([...strictPass, ...groupAPass].map(c => c.rd));
    groupAUnifiedPass = pool.filter(c => {
      if(usedRds.has(c.rd)) return false;
      const cf = parseComposition(c.composition || '');
      if(cf.length === 0) return false;
      return checkCompositionGroupAUnified(queryFibers, cf, tol);
    });
  }
  diag.groupAUnifiedPass = groupAUnifiedPass.length;

  // === Step 5c: 重量砍光時的救援、只在 Step 4 死光時觸發（不再做成分放寬、避免列 比例不符 噪音）===
  let approxPass = [];
  if(strictPass.length + groupAPass.length + groupAUnifiedPass.length === 0 && weightKilledAll && poolBeforeWeight.length > 0 && queryWt > 0){
    approxPass = poolBeforeWeight.filter(c => {
      const cw = numFromStr(c.weight);
      if(!cw) return false;
      return Math.abs(cw - queryWt) / queryWt <= 0.30;
    });
  }
  diag.approxPass = approxPass.length;

  // === Step 6: Finish (sort only, not filter) ===
  // hasFinish = chemFinish 或 mechFinish 有非空、非 Normal/Blank 值
  function hasFinish(c){
    const isBlank = v => !v || /^(none|normal|n\/a|blank|無|沒有|nil)$/i.test(String(v).trim());
    return !(isBlank(c.chemFinish) && isBlank(c.mechFinish));
  }

  // 包成 result objects
  const wrapResult = (c, groupA, approximate) => ({
    fab: c,
    groupA,
    approximate: !!approximate,
    weightRelaxed,
    subRank: subRankFn(c),
    weightDiff: queryWt ? Math.abs((numFromStr(c.weight)||0) - queryWt) / queryWt : 0,
    hasFinish: hasFinish(c)
  });

  // 通用排序：strict 優先 > GroupA > approximate > subRank ASC > weight 差距 ASC > 沒 finish 優先
  const sortFn = (a, b) => {
    // approximate 最後排
    if(a.approximate !== b.approximate) return a.approximate ? 1 : -1;
    // groupA 次後排
    if(a.groupA !== b.groupA) return a.groupA ? 1 : -1;
    if(a.subRank !== b.subRank) return a.subRank - b.subRank;
    if(a.weightDiff !== b.weightDiff) return a.weightDiff - b.weightDiff;
    if(a.hasFinish !== b.hasFinish) return a.hasFinish ? 1 : -1;
    return 0;
  };

  const results = [
    ...strictPass.map(c => wrapResult(c, false, false)),
    ...groupAPass.map(c => wrapResult(c, true, false)),
    ...groupAUnifiedPass.map(c => wrapResult(c, true, false)),
    ...approxPass.map(c => wrapResult(c, false, true))
  ];
  results.sort(sortFn);

  return {
    needsDisambiguation: false,
    candidates: results.slice(0, limit),
    weightRelaxed,
    queryType,
    diag
  };
}

function describeCandidateDiff(parsedFab, cand, groupA, weightRelaxed){
  const parts = [];
  const qw = numFromStr(parsedFab.weight), cw = numFromStr(cand.weight);
  if(qw && cw){
    const d = Math.round((cw - qw) / qw * 100);
    if(d === 0) parts.push('重量 0%');
    else parts.push(`重量 ${d>0?'+':''}${d}%`);
  }
  if(weightRelaxed) parts.push('⚠ weight 放寬到 ±20%');
  if(groupA) parts.push('⚠ Group A 替代纖維');
  return parts.join(' · ');
}


function numFromStr(s){
  if(!s) return null;
  const m = String(s).match(/(\d+(?:\.\d+)?)/);
  return m ? parseFloat(m[1]) : null;
}

const COLUMN_HINTS = {
  style:       [/dev\.?\s*style/i, /^design\s*(number|#|no)/i, /style\s*#/i, /^style$/i, /^design$/i, /^d\s*#$/i, /款號/],
  bom:         [/^bom\s*number/i, /bom\s*#/i, /^bom$/i],
  rd:          [/bom\s*primary\s*rd\s*number/i, /^rd\s*(number|#|no)/i, /^rd$/i, /material\s*code/i],
  sub:         [/^subtype/i, /material\s*subtype/i, /rd\s*name/i, /material\s*brief\s*description/i, /^description/i, /^布種/, /^類別/],
  composition: [/^composition/i, /^content$/i, /^fiber/i, /^成分/, /^組成/],
  mainMat:     [/^主料/, /^主布/, /main\s*fabric/i, /primary\s*fabric/i, /shell/i, /^fabric$/i, /^body\s*fabric$/i]
};
function detectHeaderAndCols(rows){
  let best = { score:0, headerIdx:0, cols:{} };
  for(let i = 0; i < Math.min(5, rows.length); i++){
    const row = rows[i] || [];
    if(!row.some(v => v && String(v).trim())) continue;
    const cols = {};
    const usedCols = new Set();
    let score = 0;
    // Hint-first 順序、避免「Material Name」這種寬鬆 pattern 搶到優先位
    for(const [key, patterns] of Object.entries(COLUMN_HINTS)){
      let found = false;
      for(const pat of patterns){
        for(let c = 0; c < row.length; c++){
          if(usedCols.has(c)) continue;
          const v = String(row[c]||'').trim();
          if(!v) continue;
          if(pat.test(v)){
            cols[key] = c;
            usedCols.add(c);
            score++;
            found = true;
            break;
          }
        }
        if(found) break;
      }
    }
    if(score > best.score) best = { score, headerIdx:i, cols };
  }
  return best;
}

// LIBRARY EXCEL PARSER (布料公檔上傳)
// ============================================================
const LIB_COLUMN_HINTS = {
  rd:          [/^rd$/i, /^rd\s*#/i, /^rd\s*no/i, /^rd\s*number/i, /^material\s*(number|code|no)/i, /^code$/i, /^id$/i, /^編號/, /^料號/],
  sub:         [/^sub.*type/i, /^material\s*subtype/i, /^construction/i, /^material\s*name/i, /^fabric\s*name/i, /^name$/i, /^description/i, /^子類/, /^布種/, /^名稱/],
  composition: [/^composition/i, /^content/i, /^fiber/i, /^成分/, /^組成/],
  qualityDetails: [/^quality\s*details/i, /^quality$/i],
  weight:      [/^before\s*wash\s*weight/i, /^bw$/i, /^weight\s*$/i, /^gsm\s*$/i, /^g\s*\/\s*m/i, /^克重/, /^重量/],
  width:       [/^cuttable\s*width/i, /^width\s*$/i, /^cw$/i, /^cuttable/i, /^寬幅/, /^幅寬/, /^可裁幅/],
  shrinkage:   [/shrink/i, /縮率/, /縮水/],
  supplier:    [/^supplier/i, /^vendor/i, /^factory/i, /^mill/i, /^source/i, /^廠商/, /^供應商/],
  season:      [/^season/i, /^季別/, /^季/, /^date/i, /^年份/],
  spandex:     [/^spandex\s*content/i, /^spandex/i, /^elast/i, /^彈性/, /^lycra/i, /^sp$/i],
  notes:       [/^notes?$/i, /^remark/i, /^comment/i, /^備註/, /^memo/i, /^note$/i, /^description.*remark/i],
  brand:       [/^originating\s*brands?/i, /^brand/i, /^customer/i, /^client/i, /^品牌/, /^客戶/],
  chemFinish:  [/^chemical\s*finish\s*name/i, /^chemical\s*finish$/i, /^chemical/i],
  mechFinish:  [/^mechanical\s*finish/i, /^mechanical/i],
  name:        [/^material\s*name/i, /^fabric\s*name/i],
  brief:       [/^material\s*brief\s*description/i, /^brief\s*description/i]
};

function detectLibraryHeader(rows){
  let best = { score:0, headerIdx:0, cols:{} };
  for(let i = 0; i < Math.min(15, rows.length); i++){
    const row = rows[i] || [];
    if(!row.some(v => v && String(v).trim())) continue;
    const cols = {};
    const usedCols = new Set();
    let score = 0;
    // Hint-first iteration：每個 hint 按 pattern 優先序找、嚴格的 pattern 先試
    // 例如 sub 的 /material\s*subtype/ 比 /material\s*name/ 先試、就不會被 Name 搶
    for(const [key, patterns] of Object.entries(LIB_COLUMN_HINTS)){
      let found = false;
      for(const pat of patterns){
        for(let c = 0; c < row.length; c++){
          if(usedCols.has(c)) continue;
          const v = String(row[c]||'').trim();
          if(!v) continue;
          if(pat.test(v)){
            cols[key] = c;
            usedCols.add(c);
            score++;
            found = true;
            break;
          }
        }
        if(found) break;
      }
    }
    if(score > best.score) best = { score, headerIdx:i, cols };
  }
  return best;
}

function normalizeRD(s){
  if(!s) return '';
  const t = String(s).trim();
  if(/^RD#?\d+$/i.test(t)){
    return t.toUpperCase().startsWith('RD#') ? t.toUpperCase() : 'RD#' + t.toUpperCase().replace(/^RD/i,'');
  }
  if(/^\d+$/.test(t)) return 'RD#' + t;
  return t;
}

// 內部存 RD#1059005、給 UI 顯示時去掉 # → "RD1059005"
function displayRd(rd){
  if(!rd) return '';
  return String(rd).replace(/^RD#/i, 'RD');
}

function normalizeWeight(s){
  if(!s) return '';
  const t = String(s).trim();
  const m = t.match(/(\d+(?:\.\d+)?)/);
  if(!m) return t;
  // 若已含單位保留
  if(/g\s*\/\s*m|gsm/i.test(t)) return t.replace(/\s+/g,' ');
  // oz 偵測：數值 ≤ 20 且無 g/m² 單位 → oz/yd² 換算成 gsm (×33.906)
  const num = parseFloat(m[1]);
  if(num <= 20 && !/g\/m|gsm/i.test(t)){
    return Math.round(num * 33.906) + ' g/m²';
  }
  return m[1] + ' g/m²';
}

function normalizeWidth(s){
  if(!s) return '';
  const t = String(s).trim();
  if(t.includes('"')) return t;
  if(/^\d{2,3}(\/\d{2,3})?$/.test(t)) return t + '"';
  return t;
}

function parseSpandexCell(spandexCell, compositionCell){
  if(spandexCell){
    const t = String(spandexCell).toUpperCase().trim();
    if(['Y','YES','TRUE','1','有','含','SP'].includes(t)) return true;
    if(['N','NO','FALSE','0','無','不含'].includes(t)) return false;
    // 處理 Gap Inc Excel 實際格式："with Spandex Content" / "without Spandex Content"
    if(/WITHOUT\s+SPANDEX/i.test(t)) return false;
    if(/WITH\s+SPANDEX/i.test(t))    return true;
  }
  if(compositionCell){
    const t = String(compositionCell).toLowerCase();
    if(/spandex|elastane|lycra|elasthan|elastic|彈性/.test(t)) return true;
  }
  return false;
}

function deriveBrand(brandCell, defaultBrand){
  if(!brandCell) return defaultBrand;
  const t = String(brandCell).toUpperCase().trim();
  if(t.includes('BANANA') || t.includes('BR') || t.includes('BRFS')) return 'banana';
  if(t.includes('ATHLETA') || t === 'ATH') return 'athleta';
  if(t.includes('OLD NAVY') || t.includes('ONY') || t === 'ON') return 'on';
  if(t.includes('GAP') && !t.includes('BANANA')) return 'gap';
  return defaultBrand;
}

// 公檔 Originating Brands → 一排品牌色塊（一個 RD 可能屬於多個品牌）
function brandChips(originBrand){
  if(!originBrand) return '';
  const brands = String(originBrand).split(/[,，;]/).map(b => b.trim()).filter(Boolean);
  return brands.map(b => {
    const key = deriveBrand(b, null);
    const bd = key && BRANDS[key];
    const color = bd ? bd.color : '#9ca3af';
    const label = bd ? bd.name : b;
    return `<span style="background:${color};color:#fff;padding:1px 6px;border-radius:3px;font-size:.7em;font-weight:600;margin-right:3px;display:inline-block;line-height:1.4">${escapeHtml(label)}</span>`;
  }).join('');
}

function parseLibraryExcel(file, fabricType){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try{
        const wb = XLSX.read(e.target.result, { type:'binary' });
        const sn = wb.SheetNames[0];
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header:1, defval:'' });
        const { headerIdx, cols, score } = detectLibraryHeader(rows);
        if(score === 0 || cols.rd === undefined){
          reject(new Error('找不到 RD 欄位。試了前 15 列、用了 RD/RD#/Material code/料號 等關鍵字都對不到。'));
          return;
        }
        const dataRows = rows.slice(headerIdx + 1).filter(r => r && r.some(c => String(c||'').trim()));
        const fabrics = [];
        const skipped = [];
        const source = 'lib:' + file.name;  // 來源：公檔 Excel 檔名
        dataRows.forEach((r, idx) => {
          const rdRaw = String(r[cols.rd] ?? '').trim();
          if(!rdRaw){ skipped.push({ row: headerIdx+2+idx, reason:'RD 空白' }); return; }
          const rd = normalizeRD(rdRaw);
          if(!rd.startsWith('RD#')){ skipped.push({ row: headerIdx+2+idx, reason:`RD 格式異常: ${rdRaw}` }); return; }
          const get = key => cols[key] !== undefined ? String(r[cols[key]] ?? '').trim() : '';
          // Quality Details 欄格式：100% Polyester Traceable / 3.08 BW / ...
          // 若有 % 數就擷取開頭成分段、否則 fallback 用 Composition 欄
          const _qdRaw = get('qualityDetails');
          const _compRaw = get('composition');
          let _resolvedComp = _compRaw;
          if(_qdRaw && /\d+(?:\.\d+)?%/.test(_qdRaw)){
            const _seg = _qdRaw.split(/\s*\/\s*/)[0].trim();
            if(_seg && /\d+(?:\.\d+)?%/.test(_seg)) _resolvedComp = _seg;
          }
          fabrics.push({
            rd,
            brand: null,  // 所有品牌共用，不指定 brand
            originBrand: get('brand'),  // 公檔 Originating Brands 欄、info only
            type: fabricType,
            name: [get('name'), get('brief')].filter(Boolean).join(' · '),
            sub: get('sub'),
            composition: _resolvedComp,
            weight: normalizeWeight(get('weight')),
            width: normalizeWidth(get('width')),
            shrinkage: get('shrinkage'),
            supplier: get('supplier'),
            season: get('season'),
            spandex: parseSpandexCell(get('spandex'), _resolvedComp),
            chemFinish: get('chemFinish'),
            mechFinish: get('mechFinish'),
            notes: get('notes'),
            source: source
          });
        });
        resolve({ fileName:file.name, sheetName:sn, fabricType, fabrics, skipped, headerIdx, cols, totalRows:dataRows.length });
      }catch(err){
        reject(err);
      }
    };
    reader.onerror = () => reject(new Error('讀取檔案失敗'));
    reader.readAsBinaryString(file);
  });
}

// 一次匯入大量 fabric，每 200 筆暫停讓 UI 喘氣 + 更新進度
async function bulkImportFabrics(fabrics, progressEl){
  const CHUNK = 200;
  for(let i = 0; i < fabrics.length; i += CHUNK){
    const slice = fabrics.slice(i, Math.min(i+CHUNK, fabrics.length));
    slice.forEach(f => Store.set('fabric:'+f.rd, f));
    const done = Math.min(i+CHUNK, fabrics.length);
    if(progressEl){
      const pct = Math.round(done / fabrics.length * 100);
      progressEl.querySelector('.lib-progress-fill').style.width = pct + '%';
      progressEl.querySelector('.lib-progress-text').textContent = `本機已寫入 ${done}/${fabrics.length}（${pct}%）`;
    }
    await new Promise(r => setTimeout(r, 10));
  }
}

function doSearch(){
  const q = (document.getElementById('qbox').value || '').trim();
  if(!q) return;
  State.search.query = q;
  const result = performSearch(q);
  State.search.result = result;
  pushRecent(q, result);
  render();
}

function performSearch(qRaw){
  const q = qRaw.toUpperCase().replace(/\s+/g,'');

  // 1. 款號搜尋 (D + 4 digits, optionally _BOM)
  if(/^D\d{4,}/.test(q)){
    const found = findStyle(q);
    if(found) return { kind:'style', style:found.style, key:found.key };
    // 部分款號 (例如 D101 → 列出所有 D101xxx)
    const partial = Store.list('style:').filter(k => k.startsWith(q));
    if(partial.length > 0){
      const matches = partial.map(k => ({ key:k, style:Store.get('style:'+k) })).filter(x => x.style);
      if(matches.length === 1) return { kind:'style', style:matches[0].style, key:matches[0].key };
      return { kind:'multiStyle', query:qRaw, matches };
    }
    return { kind:'notfound', query:q };
  }

  // 2. RD 搜尋 (RD#xxxx 或 純數字)
  if(/^RD#?\d+$/.test(q) || /^\d{3,}$/.test(q)){
    const digits = q.replace(/[^0-9]/g, '');
    const rdKey = 'RD#'+digits;
    const exact = Store.get('fabric:'+rdKey);
    if(exact) return { kind:'rd', rd:rdKey, fabric:exact };
    // 部分 RD 比對 (例如 1058 → 1058674, 1058692)
    const partial = Store.list('fabric:').map(k => Store.get('fabric:'+k))
      .filter(f => f && f.rd && f.rd.replace(/[^0-9]/g,'').includes(digits));
    if(partial.length === 0) return { kind:'notfound', query:rdKey };
    if(partial.length === 1) return { kind:'rd', rd:partial[0].rd, fabric:partial[0] };
    sortByInUseFirst(partial);
    return { kind:'multi', query:qRaw, matches:partial.slice(0,50), totalCount:partial.length };
  }

  // 3. 布料描述搜尋 — 多 token AND，搜 sub/composition/type/supplier/notes
  const tokens = qRaw.toUpperCase().split(/\s+/).filter(Boolean);
  let matches = Store.list('fabric:').map(k => Store.get('fabric:'+k))
    .filter(f => {
      if(!f) return false;
      const haystack = [f.name, f.sub, f.composition, f.type, f.supplier, f.chemFinish, f.mechFinish, f.notes, f.rd]
        .filter(Boolean).join(' ').toUpperCase();
      return tokens.every(t => haystack.includes(t));
    });
  sortByInUseFirst(matches);
  if(matches.length === 1) return { kind:'rd', rd:matches[0].rd, fabric:matches[0] };
  if(matches.length > 1) return { kind:'multi', query:qRaw, matches:matches.slice(0,50), totalCount:matches.length };

  // 4. 找不到 — 試解析成布料規格、跑代用布推薦（這對應 v4.38 的行為）
  //    只要文字裡有 % / gsm / oz 等規格訊號，就值得跑推薦
  //    成員不跑推薦（找不到直接跳通知，由 user spec 決定）
  const looksLikeSpec = isAdmin() && /%|\bg\s*\/?\s*m[²2]\b|\bgsm\b|\boz\b|\bgm\b/i.test(qRaw);
  if(looksLikeSpec){
    const parsed = parseMainCell(qRaw);
    if(parsed.length > 0){
      const pf = parsed[0];
      // 至少要有 composition 或 weight 才推薦得起來
      if(pf.composition || pf.weight){
        const result = findCandidates(pf, 50);
        if(result.needsDisambiguation){
          return { kind:'disambiguate', query:qRaw, parsedFab:pf, subtype:result.subtype };
        }
        if(result.candidates.length > 0){
          return { kind:'recommend', query:qRaw, parsedFab:pf, candidates:result.candidates, weightRelaxed:result.weightRelaxed, queryType:result.queryType };
        }
        // 有解析出規格、但 0 候選 — 顯示 diagnostic + 細化表單
        return { kind:'recommendEmpty', query:qRaw, parsedFab:pf, diag:result.diag };
      }
    }
  }

  return { kind:'notfound', query:qRaw };
}

// 排序：使用中的（任何 committed style 引用的）排前面，純公檔排後面
// 這對應使用者「Gap Inc Excel → .fab 公檔」的優先邏輯
function sortByInUseFirst(fabrics){
  const usedRds = new Set();
  Store.list('style:').forEach(k => {
    const s = Store.get('style:'+k);
    if(!s) return;
    if(s.mainFabric && s.mainFabric.rd) usedRds.add(s.mainFabric.rd);
    (s.accessories||[]).forEach(a => { if(a.rd) usedRds.add(a.rd); });
  });
  fabrics.sort((a,b) => (usedRds.has(b.rd) ? 1 : 0) - (usedRds.has(a.rd) ? 1 : 0));
}

function findStyle(q){
  if(q.includes('_')){
    const v = Store.get('style:'+q);
    return v ? { style:v, key:q } : null;
  }
  const keys = Store.list('style:').filter(k => k.startsWith(q+'_'));
  if(!keys.length) return null;
  return { style: Store.get('style:'+keys[0]), key: keys[0] };
}

function describeHistory(h){
  const actor = h.actor ? `<b>${escapeHtml(h.actor)}</b>` : '系統';
  switch(h.action){
    case 'commit_main':       return `${actor} 採用主布 ${escapeHtml(displayRd(h.rd||''))}`;
    case 'add_accessory':     return `${actor} 新增配布 ${escapeHtml(displayRd(h.rd||''))} (${escapeHtml(h.label||'')})`;
    case 'commit_substitute': return `${actor} 採用代用布 ${escapeHtml(displayRd(h.rd||''))}（原 ${escapeHtml(displayRd(h.original||''))}）`;
    case 'note_update':       return `${actor} 更新備註`;
    case 'excel_import':      return `${actor} 匯入 Excel：${escapeHtml(h.source||'')}`;
    default:                  return `${actor} ${escapeHtml(h.action)}`;
  }
}

function renderRdResult(rd, f){
  const bb = f.brand ? (BRANDS[f.brand] || { name:f.brand, key:'on' }) : null;
  const usedIn = findStylesUsingRd(rd);
  const adm = isAdmin();
  const inUse = usedIn.length > 0;
  const srcKind = (f.source||'').split(':')[0];   // 'lib' / 'scan' / 'bom' / ''
  const srcRest = (f.source||'').slice(srcKind.length + 1);
  // 來源 badge

function findStylesUsingRd(rd){
  const out = [];
  Store.list('style:').forEach(k => {
    const s = Store.get('style:'+k);
    if(!s) return;
    if(s.mainFabric && s.mainFabric.rd === rd) out.push({ key:k, role:'主布', label:s.mainFabric.label });
    if(s.mainFabric2 && s.mainFabric2.rd === rd) out.push({ key:k, role:'主布2', label:s.mainFabric2.label });
    (s.accessories||[]).forEach(a => { if(a.rd === rd) out.push({ key:k, role:'配布', label:a.label }); });
  });
  return out;
}

function renderRecommendResult(query, parsedFab, candidates, weightRelaxed, queryType){
  // 套用 season / type / brand 篩選
  const _ss = State.search.season || 'all';
  const _ts = State.search.type || 'all';
  const _bs = State.search.brandFilter || 'all';
  if(_ss !== 'all') candidates = candidates.filter(c => (c.fab.season||'').includes(_ss));
  if(_ts !== 'all') candidates = candidates.filter(c => (c.fab.type||'').toLowerCase() === _ts.toLowerCase());
  if(_bs !== 'all') candidates = candidates.filter(c => {
    const ob = (c.fab.originBrand||'').toUpperCase();
    return ob.includes(_bs.toUpperCase());
  });
  // 顯示解析結果 + 推薦清單
  const parsedSummary = [
    parsedFab.type && `type: ${parsedFab.type}`,
    parsedFab.sub && `sub: ${parsedFab.sub}`,
    parsedFab.composition && `成分: ${parsedFab.composition}`,
    parsedFab.weight && `重量: ${parsedFab.weight}`,
    parsedFab.width && `寬幅: ${parsedFab.width}`
  ].filter(Boolean).join(' · ') || '(無解析到的規格)';
  // 算哪些 RD 正在被使用
  const usedRds = new Set();
  Store.list('style:').forEach(k => {
    const s = Store.get('style:'+k);
    if(!s) return;
    if(s.mainFabric && s.mainFabric.rd) usedRds.add(s.mainFabric.rd);
    (s.accessories||[]).forEach(a => { if(a.rd) usedRds.add(a.rd); });
  });
  return `
    <div class="q-display-bar">
      <span class="lab">搜尋:</span>
      <span class="val">${escapeHtml(query)}</span>
      <span style="color:var(--t2);font-size:.88em">→ <b style="color:var(--ac)">推薦 ${candidates.length} 塊代用布</b></span>

      <span style="color:var(--t2);font-family:Consolas,monospace;font-size:.88em">解析到 → ${escapeHtml(parsedSummary)}</span>
      ${weightRelaxed ? '<br><span style="color:var(--or);font-weight:600">⚠ Weight ±15% 沒結果，已放寬到 ±20%</span>' : ''}
    </div>
    <div class="multi-results">
      ${candidates.map((c, idx) => {
        const f = c.fab;
        const inUse = usedRds.has(f.rd);

        return `<div class="multi-row" data-view-rd="${escapeHtml(f.rd)}">
          <div class="mr-marker"><span style="font-weight:700;color:var(--ac)">${idx+1}</span></div>

          </div>
          <div class="mr-arrow">${adoptBtn || '→'}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:20px;padding:14px 16px;background:var(--hd);border-radius:8px;border:1px solid var(--bd2)">

      <div class="lbl">📩 通知哪個品牌的負責人新增？</div>
      <div class="notify-brands">
        ${BRAND_KEYS.map(k => {
          const b = BRANDS[k];
          return `<div class="notify-brand ${k===ownBrand?'sel':''}" data-notify-brand="${k}" style="border-top-color:${b.color};color:${b.color}">${b.name}${k===ownBrand?' ✓':''}</div>`;
        }).join('')}
      </div>
      <div class="lbl" style="margin-top:6px">附訊息（選填）</div>
      <textarea id="notify-msg" placeholder="例如：我在做 D102345，需要這塊布..."></textarea>
      <div class="actions">
        <button class="btn s" data-clear="1">取消</button>
        <button class="btn" data-send-notify="${escapeHtml(q)}">送出通知</button>
      </div>
    </div>
  `;
}

function renderNotFound(q){
  // 試抓 RD：如果 query 是 RD#NNNN 或純數字、掃 Store 看有沒有用過代用
  const rdMatch = q.match(/^RD#?\s*(\d{3,})$/i);
  if(rdMatch){
    const targetRd = 'RD#' + rdMatch[1];
    const usage = countRdUsage(targetRd);
    const subUses = usage.styles.filter(x => x.sub);
    if(subUses.length > 0){
      // 有歷史代用 → 用另一個 layout
      return renderRdNotInLibButUsed(targetRd, subUses);
    }
  }
  // 真的沒看過 → 原來的找不到頁
  const looksLikeStyle = /^D\d{4,}/i.test(q);
  return `
    <div class="q-display-bar">
      <span class="lab">${q.startsWith('RD')?'RD':'查詢'}:</span><span class="val">${escapeHtml(q)}</span>
      <button class="clr" data-clear="1">✕ 清除</button>
    </div>
    <div class="notfound-wrap">
      <div class="notfound-card">
        <div class="ico">🔍</div>
        <h3>找不到 ${escapeHtml(q)}</h3>
        <div class="why">系統的公檔（Knit / Woven / Denim）裡都沒這塊布。可能是新布還沒登記、也可能 RD 打錯。</div>
        ${(isAdmin() && looksLikeStyle) ? `<button class="btn gn" style="margin-bottom:14px" data-manual-style="${escapeHtml(q)}">➕ 新增此款</button>` : ''}
        ${renderNotifyForm(q)}
      </div>
      <div class="tips-card">
        <h4>💡 找不到布料常見原因</h4>
        <ul>
          <li><b>RD 號打錯</b>——檢查首數字、有沒有缺位</li>
          <li><b>新布還沒登記</b>——客人剛上傳 CLO-set 但公檔還沒同步</li>
          <li><b>RD 前綴差異</b>——有些寫 "RD1234"，有些寫 "1234"</li>
          <li><b>檔案還沒上傳</b>——對應品牌負責人還沒匯入這季的 Excel</li>
        </ul>
      </div>
    </div>
  `;
}

// RD 不在公檔、但之前被當「客人原指定」用過代用 — 提供類似 RD 詳情頁的操作
function renderRdNotInLibButUsed(rd, subUses){
  const adm = isAdmin();
  // 從歷史 commit 抓一份 spec 出來給使用者參考（取第一筆有 originalSpec 的）
  let inheritedSpec = null;
  let inheritedActualRd = null;
  for(const u of subUses){
    const s = Store.get('style:'+u.key);
    if(!s) continue;
    const slots = [s.mainFabric, s.mainFabric2, ...(s.accessories||[])].filter(Boolean);
    for(const slot of slots){
      if(slot.originalRd === rd && slot.originalSpec){
        inheritedSpec = slot.originalSpec;
        inheritedActualRd = slot.rd;
        break;
      }
    }
    if(inheritedSpec) break;
  }
  return `
    <div class="q-display-bar">
      <span class="lab">RD:</span><span class="val">${escapeHtml(displayRd(rd))}</span>
      <span class="sbadge" style="margin-left:6px;background:#fff5d9;color:#a06f00;border:1px solid #f0c674">⚠ 公檔還沒登記</span>
      <button class="clr" data-clear="1">✕ 清除</button>
    </div>
    <div class="rd-detail-grid">
      <div class="rd-detail-card">
        <div class="head">
          <h3>${escapeHtml(displayRd(rd))}</h3>
          <span class="sbadge" style="background:#fff5d9;color:#a06f00;border:1px solid #f0c674">客人原指定 RD</span>
        </div>
        <div style="font-size:.88em;color:var(--t2);margin:8px 0 14px;line-height:1.6">
          這個 RD 公檔沒有、但<b>之前被當客人原指定、有人做過代用</b>。
          ${inheritedSpec ? '下面是繼承自歷史記錄的規格、可以當參考。' : ''}
        </div>
        ${inheritedSpec ? `
          <div class="prop-grid" style="background:#f9fafb;padding:11px 13px;border-radius:6px;font-size:.88em">
            <div class="k">布種</div><div>${escapeHtml(inheritedSpec.sub||'—')}</div>
            <div class="k">成分</div><div>${escapeHtml(inheritedSpec.composition||'—')}</div>
            <div class="k">克重</div><div>${escapeHtml(inheritedSpec.weight||'—')}</div>
            <div class="k">寬幅</div><div>${escapeHtml(inheritedSpec.width||'—')}</div>
          </div>
          <div style="font-size:.78em;color:var(--t3);margin-top:6px">↑ 來自歷史代用記錄${inheritedActualRd?'（採用 '+escapeHtml(displayRd(inheritedActualRd))+'）':''}</div>
        ` : ''}
      </div>
      <div>
        <div class="used-in-card">
          <h4>🔁 代用記錄（${subUses.length} 筆）</h4>
          ${subUses.map(u => {
            const s = Store.get('style:'+u.key);
            const ts = s && s.setDate ? s.setDate : '';
            const setBy = s && s.setBy ? s.setBy : '';
            return `<div style="padding:8px 0;border-bottom:1px dashed var(--bd2);display:flex;justify-content:space-between;align-items:center;gap:8px">
              <div style="flex:1;font-size:.88em">
                <b style="color:var(--ac)">${escapeHtml(u.key)}</b><br>
                <span style="color:var(--t2)">${escapeHtml(u.role)}</span>
                <div style="font-size:.78em;color:var(--t3);margin-top:2px">${escapeHtml(setBy)}${ts?' · '+escapeHtml(ts):''}</div>
              </div>
              <button class="btn s sm" data-view-style="${escapeHtml(u.key)}">→ 看款</button>
              ${u.actualRd ? `<button class="btn s sm" data-copy-comment="${escapeHtml(u.key)}" title="複製此款的 comment">📋</button>` : ''}
            </div>`;
          }).join('')}
        </div>
        ${adm ? `<div class="admin-panel">
          <h4>⭐ 管理員操作</h4>
          <div style="font-size:.82em;color:var(--t2);margin-bottom:8px;line-height:1.5">
            把這個 RD 設為某款的主布 / 配布。<br>
            <span style="color:var(--or)">⚠ 因為公檔還沒這 RD、款的顯示會標「公檔缺」、之後再到 Settings 上傳 .fab 補進去</span>
          </div>
          <div class="acts">
            <button class="btn" data-set-main="${escapeHtml(rd)}">⭐ 設為主布</button>
            <button class="btn s" style="border-color:#94a3b8" data-set-acc="${escapeHtml(rd)}">➕ 設為配布</button>
          </div>
        </div>` : ''}
        <details style="margin-top:14px">
          <summary style="cursor:pointer;color:var(--t2);font-size:.85em">📩 通知品牌負責人新增公檔</summary>
          <div style="margin-top:8px">${renderNotifyForm(rd)}</div>
        </details>
      </div>

function pushRecent(q, result){
  const recent = Store.get('recentSearches') || [];
  const label = result.kind === 'style' ? `${BRANDS[result.style.brand]?.name||''} · ${result.style.description||''}`
              : result.kind === 'rd' ? `${result.fabric.sub||''} · ${result.fabric.composition||''}`
              : '找不到';
  const newList = [{ q, label, ts:Date.now() }, ...recent.filter(r => r.q !== q)].slice(0,10);
  Store.set('recentSearches', newList);
}
