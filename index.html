function renderColPicker(){
  const headers = State.excel.headers || [];
  const cols = State.excel.cols || {};
  if(headers.length === 0) return '';
  const fields = [
    ['style',       '款號 (Style)',      '必選'],
    ['bom',         'BOM',               '必選'],
    ['rd',          'RD',                '選填'],
    ['sub',         '布種',              '選填'],
    ['composition', '成分 (Composition)','選填']
  ];
  const optionsHtml = headers.map((h, i) => {
    const preview = String(h || '').trim().slice(0, 30) || '(空白)';
    return { i, label: `${String.fromCharCode(65+i)}: ${preview}` };
  });
  const missing = ['style','bom'].filter(k => cols[k] === undefined);
  const hasRdOrMain = cols.rd !== undefined || cols.mainMat !== undefined;
  return `<div style="background:var(--cd);border:1px solid var(--bd);border-radius:9px;padding:13px 16px;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <b style="font-size:.95em">📊 欄位對應</b>
      ${missing.length > 0
        ? `<span style="color:var(--or);font-size:.85em">⚠ 缺 ${missing.join(', ')} — 請從下面選</span>`
        : !hasRdOrMain
          ? `<span style="color:var(--or);font-size:.85em">⚠ RD 跟主料都沒選 — 至少要選一個才能解析布料</span>`
          : `<span style="color:var(--gn);font-size:.85em">✓ 已對應，下面可手動調整</span>`}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px 14px">
      ${fields.map(([k, label, hint]) => {
        const cur = cols[k];
        const isMust = hint === '必選';
        const missingMark = isMust && cur === undefined;
        return `<div>
          <div style="font-size:.78em;color:${missingMark?'var(--or)':'var(--t2)'};margin-bottom:3px;font-weight:${missingMark?'700':'500'}">${label} <span style="color:var(--t3);font-weight:400">· ${hint}</span></div>
          <select data-col-pick="${k}" style="width:100%;padding:6px 8px;border:1px solid ${missingMark?'var(--or)':'var(--bd)'};border-radius:5px;font-size:.85em;font-family:Consolas,monospace;background:${missingMark?'var(--or-soft)':'#fff'}">
            <option value="">(不使用)</option>
            ${optionsHtml.map(o => `<option value="${o.i}" ${cur===o.i?'selected':''}>${escapeHtml(o.label)}</option>`).join('')}
          </select>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderExcelTab(){
  const rows = State.excel.rows;
  if(rows.length === 0){
    return `
      <div class="drop" id="xl-drop">
        <div class="ico">📂</div>
        <h3>把客人 Excel 拖進來（或點此選檔）</h3>
        <p>支援 .xlsx / .xls，系統會自動偵測標題列、拆主料 cell、判定 actual/需推薦/RD缺，並讓你批次採用</p>
        <input type="file" id="xl-input" accept=".xlsx,.xls">
      </div>
      <div class="banner">💡 所有解析都在你的瀏覽器裡跑，<b>檔案不會上傳到任何伺服器</b>。匯入後的「採用」決定才會同步到雲端。</div>
    `;
  }
  // Render summary + filter + table
  let actualCnt = 0, recCnt = 0, emptyCnt = 0, committedCnt = 0;
  rows.forEach(p => {
    if(p.committed) committedCnt++;
    p.fabrics.forEach(f => {
      if(f.status === 'actual') actualCnt++;
      else if(f.status === 'recommend') recCnt++;
      else if(f.status === 'empty') emptyCnt++;
    });
  });
  const totalFabrics = actualCnt + recCnt + emptyCnt;
  const colsFound = Object.entries(State.excel.cols).map(([k,v]) => `${k}=Col${String.fromCharCode(65+v)}`).join(' · ');

  const filtered = filterExcelRows(rows, State.excel.filter);

  return `
    <div class="xl-summary">
      <div>
        <div class="fname">📄 ${escapeHtml(State.excel.fileName)}</div>
        <div class="fmeta">工作表: <b>${escapeHtml(State.excel.sheetName)}</b> · 標題在第 ${State.excel.headerIdx+1} 列 · 欄: ${colsFound}</div>
      </div>
      <div class="stat"><div class="n">${rows.length}</div><div class="l">總列</div></div>
      <div class="stat gn"><div class="n">${committedCnt}</div><div class="l">已採用</div></div>
      <div class="stat"><div class="n">${totalFabrics}</div><div class="l">總布料</div></div>
      <div class="stat or"><div class="n">${recCnt}</div><div class="l">需推薦</div></div>
      <div class="stat rd"><div class="n">${emptyCnt}</div><div class="l">RD 缺</div></div>
      <div><button class="btn s sm" data-xl-reset="1">換檔案</button></div>
    </div>
    ${renderColPicker()}
    <div class="filter-row">
      <span class="filter-label">篩選</span>
      ${[
        ['all','全部',rows.length],
        ['committed','已採用',committedCnt],
        ['actual','全 Actual 待採用',rows.filter(r=>r.fabrics.every(f=>f.status==='actual')&&!r.committed).length],
        ['recommend','需推薦',rows.filter(r=>r.fabrics.some(f=>f.status==='recommend')).length],
        ['empty','RD 缺',rows.filter(r=>r.fabrics.some(f=>f.status==='empty')).length]
      ].map(([k,l,c]) => `<span class="bchip ${State.excel.filter===k?'a':''}" role="button" data-xl-filter="${k}">${l} (${c})</span>`).join('')}
      <span style="flex:1"></span>
      ${isAdmin() ? `<button class="btn gn sm" data-xl-commit-all-actual="1">✓ 批次採用全部 Actual 行</button>` : ''}
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:50px">#</th>
          <th>Dev.Style / BOM</th>
          <th style="width:75px">類別</th>
          <th>主料解析</th>
          <th style="width:130px">副料</th>
          <th style="width:90px">Season</th>
          <th style="width:140px;text-align:right">動作</th>
        </tr></thead>
        <tbody>${filtered.map((p,i) => renderExcelRow(p, rows.indexOf(p))).join('')}</tbody>
      </table>
    </div>
  `;
}

function filterExcelRows(rows, f){
  switch(f){
    case 'committed': return rows.filter(r => r.committed);
    case 'actual':    return rows.filter(r => r.fabrics.every(x => x.status==='actual') && !r.committed);
    case 'recommend': return rows.filter(r => r.fabrics.some(x => x.status==='recommend'));
    case 'empty':     return rows.filter(r => r.fabrics.some(x => x.status==='empty'));
    default: return rows;
  }
}

function renderExcelRow(p, idx){
  const hasRecommend = p.fabrics.some(f => f.status === 'recommend');
  const hasEmpty = p.fabrics.some(f => f.status === 'empty');
  const allActual = p.fabrics.every(f => f.status === 'actual');
  const cls = p.committed ? 'committed' : (hasEmpty || hasRecommend ? 'warn' : '');
  const expanded = State.excel.expandedRow === idx;

  return `
    <tr class="${cls}" data-row-idx="${idx}">
      <td><span class="cell-bom">${p.rowNum}</span></td>
      <td>
        <div class="cell-style">${escapeHtml(p.style)}</div>
        ${p.bom?`<div class="cell-bom">BOM ${escapeHtml(p.bom)}</div>`:''}
      </td>
      <td>${p.category?`<span class="cell-cat">${escapeHtml(p.category)}</span>`:''}</td>
      <td>${p.fabrics.map((f, fIdx) => renderFabricLine(f, fIdx === 0)).join('')}</td>
      <td style="font-size:.78em;color:var(--t2);line-height:1.5">${formatTrims(p.subMat)}</td>
      <td><span style="font-size:.85em;color:var(--t2)">${escapeHtml(p.season)}</span></td>
      <td style="text-align:right">
        ${p.committed
          ? `<span class="sbadge act">✓ 已採用</span>${isAdmin()?` <button class="btn s sm" data-xl-edit-row="${idx}" title="客人換布料時用">✏️ 改</button>`:''}`
          : isAdmin()
            ? (hasRecommend
              ? `<button class="btn sm" data-xl-pick-sub="${idx}">${expanded?'收合 ▴':'選代用 ▾'}</button>`
              : (allActual ? `<button class="btn gn sm" data-xl-commit-row="${idx}">✓ 採用</button>` : ''))
            : ''}
      </td>
    </tr>
    ${hasRecommend && expanded ? `<tr><td colspan="7" style="padding:0;border:none">${renderSubSelect(p, idx)}</td></tr>` : ''}
  `;
}

function renderFabricLine(f, isMain){
  const roleTag = isMain ? `<span class="role-tag">⭐主</span>` : `<span class="role-tag acc">🎨配</span>`;
  const labelTag = f.role ? `<span class="role-tag label-tag">${escapeHtml(f.role)}</span>` : '';
  const rdCell = f.rd ? `<span class="rd-cell">${escapeHtml(displayRd(f.rd))}</span>${brandChips(f.originBrand)}` : `<span class="rd-cell empty">(RD 空白)</span>`;
  const subShow = f.sub ? (f._autoSub
    ? `<span title="從『${escapeHtml(f._autoSubFrom||'')}』自動偵測、可在推薦 modal 改" style="border-bottom:1px dashed var(--or);cursor:help">🤖${escapeHtml(f.sub)}</span>`
    : escapeHtml(f.sub)) : '';
  const descParts = [subShow, f.composition, f.weight, f.width].filter(Boolean).join(', ');
  const desc = `<span class="desc">${descParts || '&lt;無描述&gt;'}</span>`;
  const badge = f.status === 'actual' ? `<span class="sbadge act">✓ actual</span>`
              : f.status === 'recommend' ? `<span class="sbadge rec">⚠ 需推薦</span>`
              : `<span class="sbadge empty">RD 缺</span>`;
  return `<div class="parsed-fab">${roleTag}${labelTag}${rdCell}${desc}${badge}</div>`;
}

function formatTrims(text){
  if(!text) return '<span style="color:var(--t3)">—</span>';
  const lines = String(text).split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  if(lines.length <= 2) return lines.map(escapeHtml).join('<br>');
  return lines.slice(0,2).map(escapeHtml).join('<br>') + `<br><span style="color:var(--t3)">+ ${lines.length-2} more</span>`;
}

// 推薦 modal 跟單筆查詢結果頁共用的「重新搜尋」按鈕綁定
function attachRefineHandlers(){
  document.querySelectorAll('[data-refine-search]').forEach(b => b.onclick = () => {
    const key = b.dataset.refineSearch;
    const [rowIdxStr, origRd] = key.split('|');
    const rowIdx = +rowIdxStr;
    const subSel = document.querySelector(`[data-refine-sub="${key}"]`);
    const compInp = document.querySelector(`[data-refine-comp="${key}"]`);
    const wInp = document.querySelector(`[data-refine-weight="${key}"]`);
    const widInp = document.querySelector(`[data-refine-width="${key}"]`);
    const spSel = document.querySelector(`[data-refine-spandex="${key}"]`);
    let target;
    if(rowIdx === -1){
      target = State.search.pendingRefine;
      if(!target) return;
    } else {
      const p = State.excel.rows[rowIdx];
      if(!p) return;
      target = p.fabrics.find(f => f.status === 'recommend' && (f.rd||'empty') === origRd);
      if(!target) return;
    }
    if(subSel){
      if(subSel.value){
        target.sub = subSel.value;
        target._autoSub = false;
        const cls = classifyType(subSel.value);
        if(cls === 'knit') target.type = 'Knit';
        else if(cls === 'woven') target.type = 'Woven';
      } else {
        target.sub = '';
      }
    }
    if(compInp) target.composition = compInp.value || '';
    if(wInp) target.weight = wInp.value ? wInp.value + ' g/m²' : '';
    if(widInp) target.width = widInp.value || '';
    if(spSel){
      if(spSel.value === 'yes') target._spandexOverride = true;
      else if(spSel.value === 'no') target._spandexOverride = false;
      else delete target._spandexOverride;
    }
    if(rowIdx === -1){
      const result = findCandidates(target, 50);
      if(result.candidates.length > 0){
        State.search.result = { kind:'recommend', query:State.search.result.query, parsedFab:target, candidates:result.candidates, weightRelaxed:result.weightRelaxed, queryType:result.queryType };
      } else {
        State.search.result = { kind:'recommendEmpty', query:State.search.result.query, parsedFab:target, diag:result.diag };
      }
      render();
      toast('已用新條件搜尋','gn');
    } else {
      delete target.candidates;
      delete target.candidatesDiag;
      renderTabContent();
      toast('已用新條件搜尋','gn');
    }
  });
}

function attachExcelTab(){
  const drop = document.getElementById('xl-drop');
  const input = document.getElementById('xl-input');
  if(drop && input){
    drop.onclick = () => input.click();
    drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
    drop.ondragleave = () => drop.classList.remove('dragover');
    drop.ondrop = e => { e.preventDefault(); drop.classList.remove('dragover'); if(e.dataTransfer.files.length) handleExcelFile(e.dataTransfer.files[0]); };
    input.onchange = e => { if(e.target.files.length) handleExcelFile(e.target.files[0]); };
  }
  // 欄位對應下拉
  document.querySelectorAll('[data-col-pick]').forEach(sel => {
    sel.onchange = () => {
      const key = sel.dataset.colPick;
      if(sel.value === '') delete State.excel.cols[key];
      else State.excel.cols[key] = parseInt(sel.value, 10);
      reparseExcelRows();
    };
  });
  document.querySelectorAll('[data-xl-filter]').forEach(b => b.onclick = () => { State.excel.filter = b.dataset.xlFilter; State.excel.expandedRow = null; renderTabContent(); });
  document.querySelectorAll('[data-xl-reset]').forEach(b => b.onclick = () => { State.excel = { fileName:null, sheetName:null, headerIdx:0, cols:{}, rows:[], filter:'all', expandedRow:null, selectedCands:{} }; renderTabContent(); });
  document.querySelectorAll('[data-xl-pick-sub]').forEach(b => b.onclick = () => {
    const i = +b.dataset.xlPickSub;
    State.excel.expandedRow = State.excel.expandedRow === i ? null : i;
    renderTabContent();
  });
  document.querySelectorAll('[data-cand-sel]').forEach(r => r.onchange = () => {
    const [rowIdx, origRd, candRd] = r.dataset.candSel.split('|');
    State.excel.selectedCands[`${rowIdx}_${origRd}`] = candRd;
    renderTabContent();
  });
  document.querySelectorAll('[data-xl-cancel-sub]').forEach(b => b.onclick = () => { State.excel.expandedRow = null; renderTabContent(); });
  document.querySelectorAll('[data-xl-commit-sub]').forEach(b => b.onclick = () => commitExcelRowSubstitute(+b.dataset.xlCommitSub));
  document.querySelectorAll('[data-xl-commit-row]').forEach(b => b.onclick = () => commitExcelRowActual(+b.dataset.xlCommitRow));
  document.querySelectorAll('[data-xl-commit-all-actual]').forEach(b => b.onclick = () => commitAllActual());
  document.querySelectorAll('[data-xl-edit-row]').forEach(b => b.onclick = () => editCommittedRow(+b.dataset.xlEditRow));
  document.querySelectorAll('[data-recand]').forEach(b => b.onclick = () => {
    const [rowIdxStr, origRd] = b.dataset.recand.split('|');
    const rowIdx = +rowIdxStr;
    const p = State.excel.rows[rowIdx];
    if(!p) return;
    const recFab = p.fabrics.find(f => f.status === 'recommend' && (f.rd||'empty') === origRd);
    if(!recFab) return;
    // 清掉舊 cache 強制重算
    delete recFab.candidates;
    delete recFab.candidatesDiag;
    renderTabContent();
    toast('已重新搜尋','gn');
  });
  attachRefineHandlers();
  document.querySelectorAll('[data-refine-search]').forEach(() => {});
}

function editCommittedRow(idx){
  const p = State.excel.rows[idx];
  if(!p || !p.committed) return;
  if(!confirm('要改採用嗎？\n\n會把這列回到「選擇主布」狀態，但舊的採用紀錄會先保留。\n重新選新布料並按「✓ 採用」後，舊的會自動被新的覆蓋。\n\n如果不重新採用就關掉這頁，舊的採用還是有效。')) return;
  p.committed = false;
  // 清掉這列的代用布選擇，讓 admin 重選
  const recFab = p.fabrics.find(f => f.status === 'recommend');
  if(recFab){
    const selKey = `${idx}_${recFab.rd||'empty'}`;
    delete State.excel.selectedCands[selKey];
  }
  toast('已解除採用 — 請重選主布','or');
  renderTabContent();
}

function parseExcelRows(rawRows, cols, headerIdx, fileName){
  const dataRows = rawRows.slice(headerIdx + 1).filter(r => r && r.some(c => String(c||'').trim()));
  const knownFamilies = new Set([...KNIT_FAMILIES, ...WOVEN_FAMILIES].map(f => f.toLowerCase()));
  return dataRows.map((r, idx) => {
    const get = k => cols[k] !== undefined ? String(r[cols[k]] ?? '').trim() : '';
    const style = get('style');
    const bom = get('bom');
    const rdCell = get('rd');
    const subCell = get('sub');
    const compCell = get('composition');
    const mainMat = get('mainMat');  // 後相容：BAC 格式整段塞一個 cell

    let fabrics = [];
    if(mainMat){
      // BAC 整段格式：用 parseMainCell 拆 RD + 成分 + 克重 + ...
      fabrics = parseMainCell(mainMat);
    } else if(rdCell){
      const t = rdCell.trim();
      if(/^\s*RD#?\s*\d{3,}\s*$/i.test(t) || /^\d{3,}$/.test(t)){
        // 純數字 / RD#NNNN — 只有 RD、沒成分
        const rd = normalizeRD(t);
        const f = { rd, role:'主布' };
        if(compCell) f.composition = compCell;
        fabrics = [f];
      } else {
        // 多行 / 整段描述 — 用 parseMainCell 處理
        fabrics = parseMainCell(t);
        if(compCell){
          fabrics.forEach(f => { if(!f.composition) f.composition = compCell; });
        }
      }
    }

    // 從「布種」column 自動抓 family（如果有選這 column）
    if(subCell && fabrics.length > 0){
      const clean = subCell.trim();
      // 先試乾淨匹配（cell 本身就是 family 名）
      let directHit = null;
      if(knownFamilies.has(clean.toLowerCase())){
        // 取原始大小寫的版本
        directHit = [...KNIT_FAMILIES, ...WOVEN_FAMILIES].find(f => f.toLowerCase() === clean.toLowerCase());
      }
      fabrics.forEach(f => {
        if(f.sub) return;  // 整段 cell 已解析出 sub、別蓋掉
        if(directHit){
          f.sub = directHit;
          // 不算 auto、是清楚輸入
        } else {
          const extracted = extractSubFromText(clean);
          if(extracted){
            f.sub = extracted;
            f._autoSub = true;
            f._autoSubFrom = clean.slice(0, 80);
          }
        }
        // 連動 type
        if(f.sub){
          const cls = classifyType(f.sub);
          if(cls === 'knit') f.type = 'Knit';
          else if(cls === 'woven') f.type = 'Woven';
        }
      });
    }

    // 每塊 fabric 跑 determineStatus + 必要時 findCandidates
    fabrics = fabrics.map(f => {
      const st = determineStatus(f);
      const cands = st.status === 'recommend' ? findCandidates(f, 50).candidates : [];
      return { ...f, ...st, candidates: cands };
    });

    const styleKey = style && bom ? `${style.split('_')[0]}_${bom}` : style;
    const existing = Store.get('style:'+styleKey);
    return {
      rowNum: headerIdx + 2 + idx,
      style, bom, styleKey,
      mainMat,
      fabrics,
      committed: !!(existing && existing._fromImport === fileName)
    };
  });
}

function reparseExcelRows(){
  if(!State.excel.rawRows) return;
  State.excel.rows = parseExcelRows(State.excel.rawRows, State.excel.cols, State.excel.headerIdx, State.excel.fileName);
  State.excel.expandedRow = null;
  State.excel.selectedCands = {};
  renderTabContent();
}

function handleExcelFile(file){
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const wb = XLSX.read(e.target.result, { type:'binary' });
      const sn = wb.SheetNames[0];
      const sheet = wb.Sheets[sn];
      const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });
      const { headerIdx, cols, score } = detectHeaderAndCols(rows);
      // 不論自動偵測有沒有命中、都繼續 — 使用者可以手動調整欄位對應
      const headers = rows[headerIdx] || [];
      const parsed = parseExcelRows(rows, cols, headerIdx, file.name);
      State.excel = {
        fileName: file.name, sheetName: sn,
        headerIdx, cols,
        rawRows: rows, headers,
        rows: parsed,
        filter:'all', expandedRow:null, selectedCands:{}
      };
      addHistory({ action:'excel_import', source:file.name });
      if(score === 0){
        toast(`已上傳，沒自動偵測到欄位 — 請手動指定`,'or');
      } else {
        toast(`已解析 ${parsed.length} 列（${score}/7 欄自動偵測，可手動調整）`,'gn');
      }
      renderTabContent();
    }catch(err){
      toast('解析失敗：'+err.message,'rd');
      console.error(err);
    }
  };
  reader.readAsBinaryString(file);
}

function commitExcelRowActual(idx){
  const p = State.excel.rows[idx];
  if(!p) return;
  if(!isAdmin()){ toast('只有負責人能採用','or'); return; }
  if(!p.styleKey){ toast('款號或 BOM 缺，無法採用','or'); return; }
  const main = p.fabrics.find(f => f.status==='actual');
  if(!main || !main.rd){ toast('找不到主布','or'); return; }
  saveStyleFromExcel(p, { rd:main.rd, label:main.role||'' }, p.fabrics.slice(1).filter(f=>f.rd).map(f=>({rd:f.rd,label:f.role||'配布'})), null);
  // 把 BOM 解析出的 fabric 規格也補到公檔（補洞，不蓋好資料）
  commitFabricsFromBom(p.fabrics.filter(f => f.rd), State.excel.fileName || 'BOM');
  p.committed = true;
  toast(`已採用 ${p.styleKey}`,'gn');
  renderTabContent();
}

function commitExcelRowSubstitute(idx){
  const p = State.excel.rows[idx];
  if(!p) return;
  if(!isAdmin()){ toast('只有負責人能採用','or'); return; }
  const recFabs = p.fabrics.filter(f => f.status === 'recommend');
  if(recFabs.length === 0) return;
  // 收集每個 recommend 布料的選擇
  const subs = {};  // originalRd → candRd
  for(const recFab of recFabs){
    const selKey = `${idx}_${recFab.rd||'empty'}`;
    const candRd = State.excel.selectedCands[selKey];
    if(!candRd){ toast(`請先選 ${recFab.rd||'(空白 RD)'} 的代用布`,'or'); return; }
    subs[recFab.rd] = candRd;
  }
  // 第一個 fabric 是主布
  const mainOrig = p.fabrics[0];
  const mainRd = mainOrig.status === 'recommend' ? subs[mainOrig.rd] : mainOrig.rd;
  const mainFabric = {
    rd: mainRd,
    label: mainOrig.role || '',
    originalRd: mainOrig.status === 'recommend' ? mainOrig.rd : undefined
  };
  if(mainOrig.status === 'recommend'){
    mainFabric.originalSpec = {
      sub: mainOrig.sub || '',
      composition: mainOrig.composition || '',
      weight: mainOrig.weight || '',
      width: mainOrig.width || ''
    };
  }
  // 其他都是配布、各自處理（recommend → 換、actual → 留）
  const accessories = p.fabrics.slice(1).filter(f => f.rd).map(f => {
    const rd = f.status === 'recommend' ? subs[f.rd] : f.rd;
    const acc = {
      rd,
      label: f.role || '配布',
      originalRd: f.status === 'recommend' ? f.rd : undefined
    };
    if(f.status === 'recommend'){
      acc.originalSpec = {
        sub: f.sub || '', composition: f.composition || '',
        weight: f.weight || '', width: f.width || ''
      };
    }
    return acc;
  });
  saveStyleFromExcel(p, mainFabric, accessories, {
    kind: 'substitute',
    substitutions: subs,
    originalRd: mainOrig.rd,
    originalFab: mainOrig
  });
  // 客人原本要的 RD 也存進公檔（即使我們用代用布、原 RD 的規格還是有價值）
  commitFabricsFromBom(p.fabrics.filter(f => f.rd), State.excel.fileName || 'BOM');
  p.committed = true;
  State.excel.expandedRow = null;
  copyCommentForStyle(p.styleKey, true);
  toast(`已採用 ${recFabs.length} 塊代用布（comment 已複製）`,'gn');
  renderTabContent();
}

function commitAllActual(){
  if(!isAdmin()) return;
  let cnt = 0;
  State.excel.rows.forEach((p, idx) => {
    if(p.committed) return;
    if(p.fabrics.every(f => f.status === 'actual')){
      commitExcelRowActual(idx);
      cnt++;
    }
  });
  if(cnt === 0) toast('沒有可批次採用的列','or');
  else toast(`批次採用 ${cnt} 列`,'gn');
}

function saveStyleFromExcel(p, mainFabric, accessories, extras){
  const existing = Store.get('style:'+p.styleKey) || {};
  const s = {
    ...existing,
    style: p.style.split('_')[0],
    bom: p.bom,
    brand: currentBrandKey(),
    season: p.season,
    category: p.category,
    description: existing.description || '',
    gender: existing.gender || '',
    mainFabric,
    accessories,
    setBy: State.user.name,
    setDate: new Date().toLocaleDateString('zh-TW'),
    _fromImport: State.excel.fileName
  };
  Store.set('style:'+p.styleKey, s);
  if(extras && extras.kind === 'substitute'){
    addHistory({ action:'commit_substitute', style:p.styleKey, rd:mainFabric.rd, original:extras.originalRd, source:'excel:'+State.excel.fileName });
  } else {
    addHistory({ action:'commit_main', style:p.styleKey, rd:mainFabric.rd, source:'excel:'+State.excel.fileName });
  }
  accessories.forEach(a => addHistory({ action:'add_accessory', style:p.styleKey, rd:a.rd, label:a.label, source:'excel:'+State.excel.fileName }));
}

function attachPendingTab(){

function attachSettingsTab(){
  document.querySelectorAll('[data-set-sec]').forEach(b => b.onclick = () => { State.settings.section = b.dataset.setSec; renderTabContent(); });
  document.querySelectorAll('[data-act="logout"]').forEach(b => b.onclick = () => { if(confirm('切換身份？')){ State.user = null; render(); } });
  document.querySelectorAll('[data-sync-pull]').forEach(b => b.onclick = async () => { toast('從雲端拉取中...','or'); await CloudSync.pull(); applyMigrations(); toast('已從雲端更新','gn'); render(); });
  document.querySelectorAll('[data-t-save]').forEach(b => b.onclick = () => {
    const k = b.dataset.tSave;
    const ta = document.getElementById(k==='actual'?'t-actual':'t-sub');
    Store.set(k==='actual'?'commentTemplate':'substituteTemplate', ta.value);
    toast('範本已儲存','gn');
  });
  document.querySelectorAll('[data-t-reset]').forEach(b => b.onclick = () => {
    const k = b.dataset.tReset;
    const def = k==='actual' ? DEFAULT_COMMENT_TEMPLATE : DEFAULT_SUBSTITUTE_TEMPLATE;
    Store.set(k==='actual'?'commentTemplate':'substituteTemplate', def);
    renderTabContent();
    toast('已恢復預設','gn');
  });
  document.querySelectorAll('[data-data-export]').forEach(b => b.onclick = () => exportData());
  document.querySelectorAll('[data-data-import]').forEach(b => b.onclick = () => importData());
  document.querySelectorAll('[data-data-clear]').forEach(b => b.onclick = () => clearData());
  document.querySelectorAll('[data-data-reset-fabrics]').forEach(b => b.onclick = () => resetAllFabrics());
  document.querySelectorAll('[data-rebuild-views]').forEach(b => b.onclick = () => rebuildViews());

  // Library upload — 三個卡共用一套邏輯
  ['Knit','Woven','Denim'].forEach(t => {
    const drop = document.querySelector(`[data-lib-drop="${t}"]`);
    const input = document.querySelector(`[data-lib-input="${t}"]`);
    if(!drop || !input) return;
    drop.onclick = e => { if(e.target.tagName !== 'INPUT') input.click(); };
    drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
    drop.ondragleave = () => drop.classList.remove('dragover');
    drop.ondrop = e => {
      e.preventDefault();
      drop.classList.remove('dragover');
      if(e.dataTransfer.files.length) handleLibraryUpload(e.dataTransfer.files[0], t);
    };
    input.onchange = e => { if(e.target.files.length) handleLibraryUpload(e.target.files[0], t); };
  });

  // Folder scan handler
  const fabInput = document.getElementById('fab-folder-input');
  if(fabInput){
    fabInput.onchange = e => {
      if(e.target.files.length){
        const typeSel = document.getElementById('fab-type').value;
        const uncPrefix = (document.getElementById('fab-unc-prefix').value || '').trim();
        handleFolderScan(e.target.files, typeSel, uncPrefix);
      }
    };
  }
}

function exportData(){
  const blob = {};
  Store.list('').forEach(k => blob[k] = Store.get(k));
  const txt = JSON.stringify(blob, null, 2);
  const ta = document.createElement('textarea');
  ta.value = txt;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  // Also download as file
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt],{type:'application/json'}));
  a.download = `gisfdt5_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('已下載備份（也已複製到剪貼簿）','gn');
}

function importData(){
  const ta = document.getElementById('import-json');
  if(!ta || !ta.value.trim()){ toast('請先貼上 JSON','or'); return; }
  if(!confirm('這會覆蓋目前的本機資料，確定？')) return;
  try{
    const obj = JSON.parse(ta.value.trim());
    Object.entries(obj).forEach(([k,v]) => {
      // strip v5 prefix if present
      const cleanKey = k.startsWith(CONFIG.STORAGE_PREFIX) ? k.slice(CONFIG.STORAGE_PREFIX.length) : k;
      Store.set(cleanKey, v);
    });
    toast(`匯入成功 (${Object.keys(obj).length} 個鍵)`,'gn');
    renderTabContent();
  }catch(e){ toast('JSON 格式錯誤：'+e.message,'rd'); }
}

  if(!confirm('再確認一次：所有 fabric、style、history、設定會被清掉，雲端也會被刪')) return;
  Store.list('').forEach(k => Store.delete(k));
  toast('清空中、等雲端同步...','or');
  clearTimeout(CloudSync._flushTimer);
  await CloudSync.flush();
  toast('已清空，重新載入...','or');

async function resetAllFabrics(){
  const fabKeys = Store.list('fabric:');
  if(fabKeys.length === 0){ toast('目前沒有布料公檔','or'); return; }
  if(!confirm(`真的要刪除 ${fabKeys.length} 塊布料公檔？\n本機 + 雲端都會被清空，不影響款 / 歷史 / 設定。`)) return;
  if(!confirm('再確認一次：這個動作無法復原')) return;
  let done = 0;
  toast(`清除中... 0/${fabKeys.length}`,'or');
  for(let i = 0; i < fabKeys.length; i += 50){
    fabKeys.slice(i, i+50).forEach(k => Store.delete(k));
    done = Math.min(i+50, fabKeys.length);
    if(done % 200 === 0 || done === fabKeys.length){
      toast(`清除中... ${done}/${fabKeys.length}`,'or');
    }
    await new Promise(r => setTimeout(r, 5));
  }
  toast(`本機清完 ${fabKeys.length} 塊，等雲端同步...`,'or');
  clearTimeout(CloudSync._flushTimer);
  await CloudSync.flush();
  toast(`✓ 雲端也已清空。可以開始上傳新的公檔了`,'gn');
  renderTabContent();
}

async function rebuildViews(){
  if(!CloudSync.enabled()){
    toast('沒有開雲端同步，無法重建','or');
    return;
  }
  const statusEl = document.getElementById('rebuild-status');
  const btn = document.querySelector('[data-rebuild-views]');
  if(btn) btn.disabled = true;
  if(statusEl){ statusEl.style.color = 'var(--t2)'; statusEl.textContent = '⏳ 呼叫後端中...'; }
  // 先把目前在隊列裡的本機變更 flush 出去，免得後端拿到舊資料
  clearTimeout(CloudSync._flushTimer);
  await CloudSync.flush();
  try{
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ action:'rebuildViews' })
    });
    const json = await res.json();

      toast('✓ 已重建瀏覽分頁，可到 Google Sheet 看','gn');
    } else {
      if(statusEl){ statusEl.style.color = 'var(--rd)'; statusEl.textContent = `❌ 失敗：${json.error}`; }
      toast(`失敗：${json.error}`,'rd');

    if(statusEl){ statusEl.style.color = 'var(--rd)'; statusEl.textContent = `❌ 網路錯誤：${err.message}`; }
    toast(`網路錯誤：${err.message}`,'rd');

}

async function handleLibraryUpload(file, fabricType){
  const progressEl = document.getElementById(`lib-progress-${fabricType}`);
  progressEl.style.display = 'block';
  progressEl.classList.remove('ok','err');
  progressEl.querySelector('.lib-progress-fill').style.width = '0%';
  progressEl.querySelector('.lib-progress-text').textContent = `📂 解析 ${file.name}...`;

  let parsed;
  try{
    parsed = await parseLibraryExcel(file, fabricType);
  }catch(err){
    progressEl.classList.add('err');
    progressEl.querySelector('.lib-progress-text').textContent = `❌ ${err.message}`;
    progressEl.querySelector('.lib-progress-fill').style.width = '100%';
    toast(`解析失敗：${err.message}`,'rd');
    return;
  }

  // 偵測結果摘要
  const cols = parsed.cols;
  const colsDetected = Object.entries(cols).map(([k,v]) => `${k}=${String.fromCharCode(65+v)}`).join(' · ');
  const sampleFabrics = parsed.fabrics.slice(0, 3);

  // 顯示確認對話
  const ok = await showImportConfirm({
    fileName: parsed.fileName,
    fabricType,
    parsed,
    colsDetected,
    sampleFabrics
  });
  if(!ok){
    progressEl.querySelector('.lib-progress-text').textContent = '已取消';
    setTimeout(() => { progressEl.style.display = 'none'; }, 1500);
    return;
  }

  // 真正匯入：寫到 localStorage（Store.set 自動 queue 到 CloudSync）
  progressEl.querySelector('.lib-progress-text').textContent = `寫入中... 0/${parsed.fabrics.length}`;
  await bulkImportFabrics(parsed.fabrics, progressEl);
  addHistory({ action:'library_import', source:`${fabricType}:${file.name}`, label:`${parsed.fabrics.length} 塊` });

  progressEl.classList.add('ok');
  progressEl.querySelector('.lib-progress-fill').style.width = '100%';
  progressEl.querySelector('.lib-progress-text').textContent = `✓ 本機完成 ${parsed.fabrics.length} 塊，雲端同步中（約 ${Math.ceil(parsed.fabrics.length/500)} 批）...`;
  toast(`已匯入 ${parsed.fabrics.length} 塊 ${fabricType}，正同步到雲端`,'gn');
}

// 簡易確認對話 — 不用 alert，因為要顯示預覽表格
// 從路徑抓 RD 號。先試檔名（去副檔名），抓不到再試 ancestor 資料夾名（由近到遠）。
// 數字必須從 segment 開頭（避免抓到日期/序號之類）
//   'Knit/RD179941.fab'      → 'RD#179941'  (from filename)
//   '179941_Single Jersey.fab' → 'RD#179941'  (from filename, leading number)
//   'GAP/1058674/swatch.zab' → 'RD#1058674' (from folder)
//   'GAP/2024_catalog.pdf'   → null  (filename starts with 2024 = 4 digits, 不夠長)
//   'GAP/README.md'          → null
function extractRdFromPath(path){
  if(!path) return null;
  const parts = path.split('/').filter(Boolean);
  if(parts.length === 0) return null;
  // 1. 檔名（去副檔名後）開頭抓
  const filename = parts[parts.length - 1];
  const nameNoExt = filename.replace(/\.[^.]+$/, '');
  const fm = nameNoExt.match(/^(?:RD[#_-]?)?(\d{5,})/i);
  if(fm) return 'RD#' + fm[1];
  // 2. 從最靠近檔案的 ancestor 資料夾往上找（含 root）
  for(let i = parts.length - 2; i >= 0; i--){
    const m = parts[i].match(/^(?:RD[#_-]?)?(\d{5,})/i);
    if(m) return 'RD#' + m[1];
  }
  return null;
}

function detectFabricTypeFromPath(path){
  const p = path.toLowerCase();
  if(/\bknit\b/.test(p)) return 'Knit';
  if(/\bwoven\b/.test(p)) return 'Woven';
  if(/\bdenim\b/.test(p)) return 'Denim';
  return null;
}

function detectBrandFromPath(path){
  const p = path.toUpperCase();
  if(p.includes('ATHLETA')) return 'athleta';
  // 注意 BANANA 必須在 GAP 之前判斷，因為 "BANANA REPUBLIC(GAP)" 兩個都含
  if(p.includes('BANANA') || /\bBR\b/.test(p) || p.includes('BRFS')) return 'banana';
  if(p.includes('ONY') || p.includes('OLD NAVY')) return 'on';
  if(p.includes('GAP')) return 'gap';
  return null;
}

async function handleFolderScan(fileList, typeOverride, uncPrefix){
  const progressEl = document.getElementById('fab-progress');
  progressEl.style.display = 'block';
  progressEl.classList.remove('ok','err');
  progressEl.querySelector('.lib-progress-fill').style.width = '0%';
  progressEl.querySelector('.lib-progress-text').textContent = `掃描資料夾中... 共 ${fileList.length} 個檔案`;

  // 標準化 UNC 前綴（結尾保證有 \）
  let uncRoot = uncPrefix || '';
  if(uncRoot && !uncRoot.endsWith('\\') && !uncRoot.endsWith('/')) uncRoot += '\\';

  // 過濾並抓 RD 號 — 支援兩種結構：
  //   (A) 檔名是 RD：例 ATHLETA/CLO/Knit/RD179941.fab
  //   (B) 資料夾名是 RD：例 GAP/1058674/swatch.zab
  // 從檔名抓不到 → 改抓「最靠近檔案的資料夾名」
  const fabFiles = [];
  const skipped = [];
  for(let i = 0; i < fileList.length; i++){
    const f = fileList[i];
    const relativePath = f.webkitRelativePath || f.name;
    const rd = extractRdFromPath(relativePath);
    if(!rd){ skipped.push({ name:relativePath, reason:'路徑無 RD 號' }); continue; }
    // 父資料夾路徑（移除檔名）；用 / 切再轉 \
    const parentRel = relativePath.split('/').slice(0,-1).join('\\');
    const folderUnc = uncRoot + parentRel;
    const detectedType = detectFabricTypeFromPath(relativePath);
    fabFiles.push({
      rd,
      relativePath,
      folderUnc,
      name: f.name,
      detectedType,
      lastModified: f.lastModified
    });
  }

  // 用 Map dedupe（同 RD 多個 .fab 檔只保留最新 lastModified 那個）
  const uniqMap = {};
  fabFiles.forEach(f => {
    if(!uniqMap[f.rd] || (f.lastModified > uniqMap[f.rd].lastModified)){
      uniqMap[f.rd] = f;
    }
  });
  const unique = Object.values(uniqMap);

  // 比對現有公檔
  const existing = new Set(Store.list('fabric:'));
  const newOnes = unique.filter(f => !existing.has(f.rd));
  const already = unique.length - newOnes.length;

  progressEl.querySelector('.lib-progress-text').textContent =
    `掃完：總共 ${fileList.length} 檔 → ${fabFiles.length} 個 .fab → ${unique.length} 個唯一 RD → ${newOnes.length} 個是新的、${already} 個公檔已有`;
  progressEl.querySelector('.lib-progress-fill').style.width = '50%';

  if(newOnes.length === 0){
    progressEl.classList.add('ok');
    progressEl.querySelector('.lib-progress-fill').style.width = '100%';
    progressEl.querySelector('.lib-progress-text').textContent = `✓ 沒有新 RD（這 ${unique.length} 個都在公檔了）`;
    toast('沒有新 RD 要加','or');
    return;
  }

  // 顯示確認對話
  const ok = await showFabScanConfirm({ newOnes, typeOverride, skipped, totalScanned:fileList.length, uncRoot });
  if(!ok){
    progressEl.querySelector('.lib-progress-text').textContent = '已取消';
    setTimeout(() => { progressEl.style.display = 'none'; }, 1500);
    return;
  }

  // 批次新增 placeholder
  progressEl.querySelector('.lib-progress-text').textContent = `新增中... 0/${newOnes.length}`;
  const placeholders = newOnes.map(f => ({
    rd: f.rd,
    brand: null,
    type: (typeOverride !== 'auto' ? typeOverride : f.detectedType) || null,
    sub: '',
    composition: '',
    weight: '',
    width: '',
    shrinkage: '',
    supplier: '',
    season: '',
    spandex: false,
    notes: '',
    source: 'scan:' + f.folderUnc,
    fabLastModified: f.lastModified
  }));
  // 用 mergeFabric 寫入（雖然是新的，但用同一條路徑保險）
  for(let i = 0; i < placeholders.length; i += 200){
    const slice = placeholders.slice(i, Math.min(i+200, placeholders.length));
    slice.forEach(pf => {
      const existing = Store.get('fabric:'+pf.rd);
      Store.set('fabric:'+pf.rd, mergeFabric(existing, pf));
    });
    const done = Math.min(i+200, placeholders.length);
    const pct = Math.round(done / placeholders.length * 100);
    progressEl.querySelector('.lib-progress-fill').style.width = pct + '%';
    progressEl.querySelector('.lib-progress-text').textContent = `本機寫入 ${done}/${placeholders.length}（${pct}%）`;
    await new Promise(r => setTimeout(r, 10));
  }
  addHistory({ action:'fab_scan_import', source:'folder_scan', label:`${placeholders.length} 個 .fab placeholder` });

  progressEl.classList.add('ok');
  progressEl.querySelector('.lib-progress-fill').style.width = '100%';
  progressEl.querySelector('.lib-progress-text').textContent = `✓ 新增 ${placeholders.length} 個 placeholder，雲端同步中...`;
  toast(`已新增 ${placeholders.length} 個 RD placeholder`,'gn');
}

function attachResultHandlers(){
  document.querySelectorAll('[data-clear]').forEach(b => b.onclick = () => { State.search.result = null; render(); });
  attachRefineHandlers();
  document.querySelectorAll('[data-adopt-sub]').forEach(b => b.onclick = e => {
    e.stopPropagation();  // 不要觸發 row click 跳到 RD detail
    openAdoptAsSubstitute(b.dataset.adoptSub);
  });
  document.querySelectorAll('[data-recent]').forEach(b => b.onclick = () => { document.getElementById('qbox').value = b.dataset.recent; doSearch(); });
  document.querySelectorAll('[data-view-rd]').forEach(el => el.onclick = e => {
    e.preventDefault();
    const rd = el.dataset.viewRd;
    const f = Store.get('fabric:'+rd);
    if(f){ State.search.result = { kind:'rd', rd, fabric:f }; render(); }
  });
  document.querySelectorAll('[data-view-style]').forEach(el => el.onclick = e => {
    e.preventDefault();
    const s = Store.get('style:'+el.dataset.viewStyle);
    if(s){ State.search.result = { kind:'style', style:s, key:el.dataset.viewStyle }; render(); }
  });
  document.querySelectorAll('[data-switch-bom]').forEach(el => el.onclick = () => {
    const s = Store.get('style:'+el.dataset.switchBom);
    if(s){ State.search.result = { kind:'style', style:s, key:el.dataset.switchBom }; render(); }
  });
  document.querySelectorAll('[data-copy-comment]').forEach(b => b.onclick = () => copyCommentForStyle(b.dataset.copyComment, false));
  document.querySelectorAll('[data-edit-main-fab]').forEach(b => b.onclick = () => openEditMainFab(b.dataset.editMainFab));
  document.querySelectorAll('[data-delete-style]').forEach(b => b.onclick = () => {
    if(!isAdmin()){ toast('只有負責人能刪','or'); return; }
    const key = b.dataset.deleteStyle;
    const style = Store.get('style:' + key);
    if(!style){ toast('找不到這款','or'); return; }
    const styleKey = style.styleKey || key;
    if(!confirm(`確定要刪除 ${styleKey} 的採用紀錄嗎？\n\n會刪掉：\n• 主布 / 配布記錄\n• 歷史紀錄\n• Comment 資料\n\n公檔的 RD 規格不會動。\n刪除後可以從 Excel 重新匯入再採用。`)) return;
    Store.delete('style:' + key);
    // 把 State.excel.rows 裡同款的 committed flag 也清掉、不用重傳就能再走流程
    if(State.excel && State.excel.rows){
      State.excel.rows.forEach(p => {
        if((p.styleKey || p.style) === styleKey) p.committed = false;
      });
    }
    State.search.result = null;
    toast(`✓ 已刪除 ${styleKey} 的採用紀錄`, 'gn');
    render();
  });
  document.querySelectorAll('[data-disambig-type]').forEach(b => b.onclick = () => {
    // admin 選了 Knit 或 Woven — 修改 parsedFab.type 並重跑 findCandidates
    const r = State.search.result;
    if(!r || r.kind !== 'disambiguate') return;
    const chosenType = b.dataset.disambigType;  // 'Knit' or 'Woven'
    const pf = { ...r.parsedFab, type: chosenType };
    const result = findCandidates(pf, 50);
    if(result.candidates.length > 0){
      State.search.result = { kind:'recommend', query:r.query, parsedFab:pf, candidates:result.candidates, weightRelaxed:result.weightRelaxed, queryType:chosenType };
    } else {
      State.search.result = { kind:'notfound', query:r.query };
    }
    render();
  });
  document.querySelectorAll('[data-notify-brand]').forEach(el => el.onclick = () => {
    document.querySelectorAll('[data-notify-brand]').forEach(x => x.classList.remove('sel'));
    el.classList.add('sel');
  });
  document.querySelectorAll('[data-send-notify]').forEach(b => b.onclick = () => {
    const q = b.dataset.sendNotify;
    // 優先用 data-notify-to (成員 form 直接帶 brand) — 沒有的話 fallback 到舊的 .sel 選擇邏輯
    let brand = b.dataset.notifyTo;
    if(!brand){
      const brandEl = document.querySelector('[data-notify-brand].sel');
      brand = brandEl ? brandEl.dataset.notifyBrand : null;
    }
    const msg = (document.getElementById('notify-msg')||{}).value || '';
    if(!brand){ toast('請選一個品牌','or'); return; }
    sendNotify(q, brand, msg);
  });
  document.querySelectorAll('[data-edit-notes]').forEach(b => b.onclick = () => editNotes(b.dataset.editNotes));
  document.querySelectorAll('[data-set-main]').forEach(b => b.onclick = () => setAsMainOrAcc(b.dataset.setMain, 'main'));
  document.querySelectorAll('[data-set-acc]').forEach(b => b.onclick = () => setAsMainOrAcc(b.dataset.setAcc, 'acc'));
  document.querySelectorAll('[data-set-sub]').forEach(b => b.onclick = () => openAdoptAsSubstitute(b.dataset.setSub));
  document.querySelectorAll('[data-add-acc]').forEach(b => b.onclick = () => addAccessory(b.dataset.addAcc));
  document.querySelectorAll('[data-manual-style]').forEach(b => b.onclick = () => openManualStyleSetup(b.dataset.manualStyle));
}

function copyCommentForStyle(styleKey, autoBypass){
  const s = Store.get('style:'+styleKey);
  if(!s){ toast('找不到此款','rd'); return; }
  if(!s.mainFabric){ toast('此款還沒指定主布','or'); return; }
  const actual = Store.get('fabric:'+s.mainFabric.rd);
  if(!actual){ toast(`公檔找不到 ${s.mainFabric.rd}`,'rd'); return; }
  const isSubstitute = !!s.mainFabric.originalRd;
  const tmpl = isSubstitute
    ? (Store.get('substituteTemplate') || DEFAULT_SUBSTITUTE_TEMPLATE)
    : (Store.get('commentTemplate') || DEFAULT_COMMENT_TEMPLATE);
  let original = null;
  if(isSubstitute) original = Store.get('fabric:'+s.mainFabric.originalRd);
  const text = applyTemplate(tmpl, actual, original, s);
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(
      () => { if(!autoBypass) toast('Comment 已複製','gn'); },
      () => fallbackCopy(text)
    );
  } else fallbackCopy(text);
}

function applyTemplate(tmpl, actual, original, style){
  const notesBlock = actual.notes ? `\nNote: ${actual.notes}` : '';
  // tech_name: 跟著「現在誰在用」走 —
  //   admin 登入時就鎖定為該 brand 對應的 tech
  //   成員透過上方 chip 切換「在幫哪組」，State.user.name 跟著 chip brand 走
  //   如果成員還沒選 brand，fallback 到該款 brand 的負責人（保險不會空白）
  const techName = (State.user && State.user.name)
    ? State.user.name
    : (style && style.brand && BRANDS[style.brand] ? BRANDS[style.brand].tech : '');
  // 找 originalSpec — 公檔沒有客人指定 RD 時、用這個 fallback
  const mf = style && style.mainFabric;
  const spec = (mf && mf.originalSpec) || {};
  const repl = {
    actual_rd: displayRd(actual.rd || ''),
    actual_sub: actual.sub || '',
    actual_composition: actual.composition || '',
    actual_width: actual.width || '—',
    actual_weight: actual.weight || '—',
    actual_shrinkage: actual.shrinkage || '—',
    actual_supplier: actual.supplier || '—',
    actual_notes_block: notesBlock,
    original_rd: displayRd(original ? original.rd : (mf && mf.originalRd) || ''),
    original_sub: original ? (original.sub || '') : (spec.sub || ''),
    original_composition: original ? (original.composition || '') : (spec.composition || ''),
    original_weight: original ? (original.weight || '') : (spec.weight || ''),
    original_width: original ? (original.width || '') : (spec.width || ''),
    style: style ? style.style : '',
    bom: style ? style.bom : '',
    brand: style ? (BRANDS[style.brand]?.name || '') : '',
    tech_name: techName
  };
  return tmpl.replace(/\{(\w+)\}/g, (m, k) => repl[k] !== undefined ? repl[k] : m);
}

function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); toast('Comment 已複製','gn'); }
  catch(e){ toast('複製失敗','rd'); }
  document.body.removeChild(ta);
}

function sendNotify(rd, brand, msg){
  const list = Store.get('pendingRequests') || [];
  list.push({

    fromUser: isAdmin() ? State.user.name : '成員',
    fromBrand: currentBrandKey() || null,

  toast(`已通知 ${BRANDS[brand].name} 負責人 (${BRANDS[brand].tech})`,'gn');
  State.search.result = null;
  render();
}

      '<div style="padding:8px 0 4px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.85em">',
      '<div style="grid-column:span 2"><label style="font-weight:600;display:block;margin-bottom:2px">客人原 RD（沒就空著）</label>',
      '<input id="em-'+prefix+'-orig-rd" type="text" class="ta" style="font-family:Consolas,monospace" value="'+escapeHtml(displayRd(f.originalRd||''))+'" placeholder="例 RD1032855"></div>',
      '<div><label style="font-weight:600;display:block;margin-bottom:2px">布種</label>',
      '<input id="em-'+prefix+'-spec-sub" type="text" class="ta" value="'+escapeHtml(spec.sub||'')+'" placeholder="例 Interlock"></div>',
      '<div><label style="font-weight:600;display:block;margin-bottom:2px">成分</label>',
      '<input id="em-'+prefix+'-spec-comp" type="text" class="ta" value="'+escapeHtml(spec.composition||'')+'" placeholder="例 56% Rayon 39% Poly"></div>',
      '<div><label style="font-weight:600;display:block;margin-bottom:2px">克重</label>',
      '<input id="em-'+prefix+'-spec-wt" type="text" class="ta" value="'+escapeHtml(spec.weight||'')+'" placeholder="例 230 g/m²"></div>',
      '<div><label style="font-weight:600;display:block;margin-bottom:2px">寬幅</label>',
      '<input id="em-'+prefix+'-spec-wd" type="text" class="ta" value="'+escapeHtml(spec.width||'')+'" placeholder="例 64"></div>',
      '</div></details>',
      '</fieldset>'
    ].join('');
  };
  const root = document.getElementById('modal-root');
  root.innerHTML = [
    '<div class="modal-bg" id="em-bg">',
    '<div class="modal" style="max-width:700px;max-height:88vh;display:flex;flex-direction:column">',
    '<h3>✏️ 改主布 — '+escapeHtml(styleKey)+'</h3>',
    '<div class="body-x" style="overflow-y:auto;flex:1">',
    '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:12px;padding:6px 10px;background:#f0f7ff;border-radius:5px;font-size:.9em">',
    '<input type="checkbox" id="em-isset" '+(initSet?'checked':'')+'> <b>這是 SET 款</b>（會多出主布2 / SET 下身 一格）',
    '</label>',
    slotHtml('m', '⭐ 主布 (一般 / SET 上身)', s.mainFabric, false),
    slotHtml('m2', '⭐ 主布2 (SET 下身)', s.mainFabric2, !initSet),
    '</div>',
    '<div class="modal-acts">',
    '<button class="btn s" id="em-cancel">取消</button>',
    '<button class="btn gn" id="em-ok">✓ 儲存</button>',
    '</div></div></div>'
  ].join('');
  let foundFabs = { m: null, m2: null };
  const setupSlot = (prefix) => {
    const rdInput = document.getElementById('em-'+prefix+'-rd');
    const preview = document.getElementById('em-'+prefix+'-preview');
    const lookup = () => {
      const raw = rdInput.value.trim();
      foundFabs[prefix] = null;
      if(!raw){ preview.innerHTML = '<span style="color:var(--t3)">(空 = 沒這格)</span>'; return; }
      const rd = normalizeRD(raw);
      if(!rd.startsWith('RD#')){ preview.innerHTML = '<span style="color:var(--rd)">⚠ 格式不對</span>'; return; }
      const f = Store.get('fabric:'+rd);
      if(!f){ preview.innerHTML = '<span style="color:var(--rd)">❌ 公檔找不到 '+escapeHtml(displayRd(rd))+'</span>'; return; }
      foundFabs[prefix] = f;
      preview.innerHTML = '<span style="color:var(--gn)">✓ '+escapeHtml(displayRd(f.rd))+' · '+escapeHtml(f.sub||'—')+' · '+escapeHtml((f.composition||'—').slice(0,50))+' · '+escapeHtml(f.weight||'—')+'</span>';
    };
    rdInput.oninput = lookup;
    lookup();
  };
  setupSlot('m');
  setupSlot('m2');
  const setCb = document.getElementById('em-isset');
  const slot2 = document.getElementById('em-slot-m2');
  setCb.onchange = () => { slot2.style.display = setCb.checked ? '' : 'none'; };
  document.getElementById('em-cancel').onclick = () => root.innerHTML = '';
  document.getElementById('em-ok').onclick = () => {
    if(!foundFabs.m){ toast('主布 RD 必須填、且在公檔內','or'); return; }
    const isSet = setCb.checked;
    if(isSet && !foundFabs.m2 && document.getElementById('em-m2-rd').value.trim()){
      toast('主布2 RD 在公檔找不到、修正或清空','or'); return;
    }
    const buildSlot = (prefix, fab) => {
      if(!fab) return null;
      const label = document.getElementById('em-'+prefix+'-label').value.trim();
      const origRdRaw = document.getElementById('em-'+prefix+'-orig-rd').value.trim();
      const origRd = origRdRaw ? normalizeRD(origRdRaw) : '';
      const specSub = document.getElementById('em-'+prefix+'-spec-sub').value.trim();
      const specComp = document.getElementById('em-'+prefix+'-spec-comp').value.trim();
      const specWt = document.getElementById('em-'+prefix+'-spec-wt').value.trim();
      const specWd = document.getElementById('em-'+prefix+'-spec-wd').value.trim();
      const slot = { rd: fab.rd, label };
      if(origRd) slot.originalRd = origRd;
      if(specSub || specComp || specWt || specWd){
        slot.originalSpec = { sub:specSub, composition:specComp, weight:specWt, width:specWd };
      }
      return slot;
    };
    const oldRd = s.mainFabric ? s.mainFabric.rd : '';
    const oldM2Rd = s.mainFabric2 ? s.mainFabric2.rd : '';
    s.mainFabric = buildSlot('m', foundFabs.m);
    s.mainFabric2 = isSet ? buildSlot('m2', foundFabs.m2) : null;
    s.isSet = isSet;
    s.setBy = State.user.name;
    s.setDate = new Date().toLocaleDateString('zh-TW');
    Store.set('style:'+styleKey, s);
    addHistory({
      action:'style_main_changed',
      style: styleKey,
      rd: foundFabs.m.rd,
      original: oldRd,
      m2_rd: s.mainFabric2 ? s.mainFabric2.rd : '',
      m2_original: oldM2Rd,
      isSet,
      actor: State.user.name
    });
    toast('已改主布'+(isSet?' + 主布2':''),'gn');
    root.innerHTML = '';
    State.search.result = { kind:'style', style:s, key:styleKey };
    render();
  };
}

function openAdoptAsSubstitute(candRd){
  if(!isAdmin()){ toast('只有負責人能採用','or'); return; }
  const cand = Store.get('fabric:'+candRd);
  if(!cand){ toast('找不到這塊布','or'); return; }
  const query = (State.search.result && State.search.result.query) || '';
  // 從 query 解析 spec、待會存進 originalSpec
  const parsedFromQuery = parseMainCell(query)[0] || {};
  // 從 query 試抓 RD 預填客人原始 RD
  const rdMatch = query.match(/RD#?\s*(\d{3,})/i);
  const prefillOrig = rdMatch ? 'RD' + rdMatch[1] : '';
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-bg" id="ad-bg">
      <div class="modal" style="max-width:600px">
        <h3>💾 採用 ${escapeHtml(displayRd(candRd))} 為代用</h3>
        <div class="body-x">
          <div style="font-size:.85em;color:var(--t2);margin-bottom:14px;line-height:1.5;background:var(--cd);padding:8px 12px;border-radius:5px">
            <b>你查的條件：</b><br>${escapeHtml(query)}
            <div style="font-size:.78em;color:var(--t3);margin-top:5px">解析到 → 布種: ${escapeHtml(parsedFromQuery.sub||'—')} · 成分: ${escapeHtml(parsedFromQuery.composition||'—')} · 重量: ${escapeHtml(parsedFromQuery.weight||'—')}</div>
          </div>
          <label style="font-size:.85em;font-weight:600;display:block;margin-bottom:4px">要採用到哪個款號 <span style="color:var(--rd)">*</span></label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.82em;margin-bottom:8px;color:var(--t2)">
            <input type="checkbox" id="ad-batch-toggle"> 批次模式（貼一串款號、套用同一塊代用布，僅設為主布）
          </label>
          <input type="text" id="ad-style" class="ta" placeholder="例：D104877 或 D104877_876050" autocomplete="off">
          <textarea id="ad-style-batch" class="ta" style="display:none;min-height:110px;font-family:Consolas,monospace" placeholder="一行一款，例：&#10;D104877&#10;D104880_876050&#10;D104899"></textarea>
          <div id="ad-check" style="font-size:.82em;margin-top:5px;min-height:20px"></div>
          <div id="ad-set-wrap" style="display:none;margin-top:6px;padding:6px 10px;background:#f0f7ff;border-radius:4px">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.85em">
              <input type="checkbox" id="ad-isset"> 這是 SET 款（上下身分開、會有主布 + 主布2）
            </label>
          </div>
          <label style="font-size:.85em;font-weight:600;display:block;margin:14px 0 4px">客人指定的原始 RD（沒就空著、不會驗證公檔）</label>
          <input type="text" id="ad-orig" class="ta" style="font-family:Consolas,monospace" placeholder="例：1064466" value="${escapeHtml(prefillOrig)}">
          <label style="font-size:.85em;font-weight:600;display:block;margin:14px 0 6px" id="ad-role-label">採用為</label>
          <div id="ad-role-wrap" style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
              <input type="radio" name="ad-role" value="main" checked> ⭐ 主布
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer" id="ad-main2-lbl">
              <input type="radio" name="ad-role" value="main2"> ⭐ 主布2 <span style="font-size:.75em;color:var(--t3)">(SET 下身)</span>
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer" id="ad-acc-lbl">
              <input type="radio" name="ad-role" value="acc"> 🎨 配布
            </label>
            <span id="ad-acc-hint" style="font-size:.78em;color:var(--t3);flex-basis:100%"></span>
          </div>
        </div>
        <div class="modal-acts">
          <button class="btn s" id="ad-cancel">取消</button>
          <button class="btn gn" id="ad-ok" disabled>✓ 採用並產生 comment</button>
        </div>
      </div>
    </div>`;
  const styleInp = document.getElementById('ad-style');
  const origInp = document.getElementById('ad-orig');
  const check = document.getElementById('ad-check');
  const okBtn = document.getElementById('ad-ok');
  const accRadio = document.querySelector('input[name="ad-role"][value="acc"]');
  const main2Radio = document.querySelector('input[name="ad-role"][value="main2"]');
  const mainRadio = document.querySelector('input[name="ad-role"][value="main"]');
  const accLbl = document.getElementById('ad-acc-lbl');
  const main2Lbl = document.getElementById('ad-main2-lbl');
  const accHint = document.getElementById('ad-acc-hint');
  const setWrap = document.getElementById('ad-set-wrap');
  const isSetCb = document.getElementById('ad-isset');
  let existingStyle = null;
  const setDisabled = (lbl, radio, disabled) => {
    radio.disabled = disabled;
    lbl.style.opacity = disabled ? '0.45' : '1';
    if(disabled && radio.checked) mainRadio.checked = true;
  };
  const updateCheck = () => {
    const key = styleInp.value.trim();
    existingStyle = null;
    if(!key){
      check.innerHTML = '';
      setDisabled(accLbl, accRadio, true);
      setDisabled(main2Lbl, main2Radio, true);
      setWrap.style.display = 'none';
      accHint.textContent = '';
      okBtn.disabled = true;
      return;
    }
    existingStyle = Store.get('style:'+key);
    if(existingStyle){
      const mainRd = existingStyle.mainFabric && existingStyle.mainFabric.rd ? displayRd(existingStyle.mainFabric.rd) : '(無主布)';
      const main2Rd = existingStyle.mainFabric2 && existingStyle.mainFabric2.rd ? displayRd(existingStyle.mainFabric2.rd) : '';
      const accCount = (existingStyle.accessories||[]).length;
      const isSet = !!existingStyle.isSet || !!existingStyle.mainFabric2;
      check.innerHTML = `<span style="color:var(--gn)">✓ 找到這款 — 主布 <b>${escapeHtml(mainRd)}</b>${main2Rd?' · 主布2 <b>'+escapeHtml(main2Rd)+'</b>':''} · ${accCount} 個配布${isSet?' · <span style="color:var(--ac)">SET</span>':''}</span>`;
      setDisabled(accLbl, accRadio, false);
      setDisabled(main2Lbl, main2Radio, !isSet);
      setWrap.style.display = 'none';
      accHint.textContent = isSet ? '' : '主布2 灰掉：這款還沒標 SET、要的話勾下面 checkbox（要先建為新款）';
    } else {
      check.innerHTML = `<span style="color:var(--or)">⚠ 還沒這款、選「主布」會建立新款</span>`;
      setDisabled(accLbl, accRadio, true);
      setWrap.style.display = 'block';
      // 新款時、主布2 可選但要先勾 SET
      setDisabled(main2Lbl, main2Radio, !isSetCb.checked);
      accHint.textContent = '(找不到這款、無法加配布)';
    }
    okBtn.disabled = false;
  };
  styleInp.oninput = updateCheck;
  isSetCb.onchange = () => {
    if(!existingStyle){
      setDisabled(main2Lbl, main2Radio, !isSetCb.checked);
    }
  };
  const batchToggle = document.getElementById('ad-batch-toggle');
  const styleBatchInp = document.getElementById('ad-style-batch');
  const roleWrap = document.getElementById('ad-role-wrap');
  const roleLabel = document.getElementById('ad-role-label');
  batchToggle.onchange = () => {
    const isBatch = batchToggle.checked;
    styleInp.style.display = isBatch ? 'none' : '';
    styleBatchInp.style.display = isBatch ? 'block' : 'none';
    setWrap.style.display = 'none';
    roleWrap.style.display = isBatch ? 'none' : 'flex';
    roleLabel.style.display = isBatch ? 'none' : '';
    check.innerHTML = isBatch ? '' : '';
    if(isBatch){
      mainRadio.checked = true;
      okBtn.disabled = !styleBatchInp.value.trim();
    } else {
      updateCheck();
    }
  };
  styleBatchInp.oninput = () => { okBtn.disabled = !styleBatchInp.value.trim(); };
  setTimeout(() => styleInp.focus(), 50);
  document.getElementById('ad-cancel').onclick = () => root.innerHTML = '';
  okBtn.onclick = () => {
    if(batchToggle.checked){
      const keys = styleBatchInp.value.split(/[\n,]+/).map(s => s.trim().toUpperCase()).filter(Boolean);
      if(keys.length === 0){ toast('至少貼一個款號','or'); return; }
      const origRdRaw = origInp.value.trim();
      const origRd = origRdRaw ? normalizeRD(origRdRaw) : '';
      const originalSpec = (origRd || parsedFromQuery.sub || parsedFromQuery.composition || parsedFromQuery.weight) ? {
        sub: parsedFromQuery.sub || '', composition: parsedFromQuery.composition || '',
        weight: parsedFromQuery.weight || '', width: parsedFromQuery.width || ''
      } : null;
      let created = 0, updated = 0;
      keys.forEach(styleKey => {
        let s = Store.get('style:'+styleKey);
        if(!s){
          s = {
            style: styleKey.split('_')[0],
            bom: styleKey.includes('_') ? styleKey.split('_').slice(1).join('_') : '',
            brand: currentBrandKey(), season:'', category:'', description:'',
            mainFabric: null, mainFabric2: null, isSet:false, accessories: [],
            setBy: State.user.name, setDate: new Date().toLocaleDateString('zh-TW')
          };
          created++;
        } else updated++;
        const fab = { rd: candRd, label:'', originalRd: origRd || undefined };
        if(originalSpec) fab.originalSpec = originalSpec;
        s.mainFabric = fab;
        s.setBy = State.user.name; s.setDate = new Date().toLocaleDateString('zh-TW');
        Store.set('style:'+styleKey, s);
        addHistory({ action: origRd ? 'commit_substitute' : 'commit_main', style:styleKey, rd:candRd, original: origRd || undefined, slot:'main', source:'batch', actor: State.user.name });
      });
      root.innerHTML = '';
      toast(`✓ 已套用 ${keys.length} 款（新建 ${created}、更新 ${updated}）`, 'gn');
      render();
      return;
    }
    const styleKey = styleInp.value.trim();
    if(!styleKey){ toast('款號是必填','or'); return; }
    const origRdRaw = origInp.value.trim();
    const origRd = origRdRaw ? normalizeRD(origRdRaw) : '';
    const role = document.querySelector('input[name="ad-role"]:checked').value;
    // 把 query 解析出來的 spec 存進 originalSpec、之後 comment 可用
    const originalSpec = (origRd || parsedFromQuery.sub || parsedFromQuery.composition || parsedFromQuery.weight) ? {
      sub: parsedFromQuery.sub || '',
      composition: parsedFromQuery.composition || '',
      weight: parsedFromQuery.weight || '',
      width: parsedFromQuery.width || ''
    } : null;
    const wantsSet = existingStyle ? (!!existingStyle.isSet || !!existingStyle.mainFabric2) : isSetCb.checked;
    
    if(role === 'main' || role === 'main2'){
      // 建/更新款
      let s = existingStyle;
      if(!s){
        s = {
          style: styleKey.split('_')[0],
          bom: styleKey.includes('_') ? styleKey.split('_').slice(1).join('_') : '',
          brand: currentBrandKey(), season:'', category:'', description:'',
          mainFabric: null, mainFabric2: null, isSet: wantsSet, accessories: [],
          setBy: State.user.name, setDate: new Date().toLocaleDateString('zh-TW')
        };
      }
      const fab = { rd: candRd, label:'', originalRd: origRd || undefined };
      if(originalSpec) fab.originalSpec = originalSpec;
      if(role === 'main') s.mainFabric = fab;
      else { s.mainFabric2 = fab; s.isSet = true; }
      s.setBy = State.user.name;
      s.setDate = new Date().toLocaleDateString('zh-TW');
      Store.set('style:'+styleKey, s);
      addHistory({
        action: origRd ? 'commit_substitute' : 'commit_main',
        style: styleKey,
        rd: candRd,
        original: origRd || undefined,
        slot: role,
        source: 'search',
        actor: State.user.name
      });
    } else {
      // 配布
      if(!existingStyle){ toast('找不到這款、無法加配布','or'); return; }
      existingStyle.accessories = existingStyle.accessories || [];
      const acc = { rd: candRd, label:'配布', originalRd: origRd || undefined };
      if(originalSpec) acc.originalSpec = originalSpec;
      existingStyle.accessories.push(acc);
      Store.set('style:'+styleKey, existingStyle);
      addHistory({
        action: origRd ? 'commit_substitute' : 'add_accessory',
        style: styleKey,
        rd: candRd,
        original: origRd || undefined,
        slot: 'acc',
        label: '配布',
        source: 'search',
        actor: State.user.name
      });
    }
    root.innerHTML = '';
    copyCommentForStyle(styleKey, true);
    toast('✓ 已採用、comment 已複製','gn');
    State.search.result = { kind:'style', style:Store.get('style:'+styleKey), key:styleKey };
    render();
  };
}

        </div>
        <div class="modal-acts">
          <button class="btn s" id="ms-cancel">取消</button>
          <button class="btn gn" id="ms-ok">✓ 存檔並產生 comment</button>
        </div>
      </div>
    </div>`;
  const styleInp = document.getElementById('ms-style');
  const isSetCb = document.getElementById('ms-isset');
  const correctRdInp = document.getElementById('ms-correct-rd');
  const correctInfo = document.getElementById('ms-correct-info');
  const correctManual = document.getElementById('ms-correct-manual');
  const cSub = document.getElementById('ms-c-sub'), cComp = document.getElementById('ms-c-comp'),
        cWeight = document.getElementById('ms-c-weight'), cWidth = document.getElementById('ms-c-width');
  const subRdInp = document.getElementById('ms-sub-rd');
  const subInfo = document.getElementById('ms-sub-info');
  const recBtn = document.getElementById('ms-recommend-btn');
  const recList = document.getElementById('ms-recommend-list');
  const main2Radio = document.querySelector('input[name="ms-role"][value="main2"]');
  const main2Lbl = document.getElementById('ms-main2-lbl');
  const mainRadio = document.querySelector('input[name="ms-role"][value="main"]');
  let correctFab = null;

  const setMain2Disabled = disabled => {
    main2Radio.disabled = disabled;
    main2Lbl.style.opacity = disabled ? '0.45' : '1';
    if(disabled && main2Radio.checked) mainRadio.checked = true;
  };
  isSetCb.onchange = () => setMain2Disabled(!isSetCb.checked);
  setMain2Disabled(true);

  const checkCorrect = () => {
    const raw = correctRdInp.value.trim();
    correctFab = null;
    if(!raw){ correctInfo.innerHTML = ''; correctManual.style.display = 'none'; return; }
    const rdK = normalizeRD(raw);
    correctFab = Store.get('fabric:'+rdK);
    if(correctFab){
      correctInfo.innerHTML = `<span style="color:var(--gn)">✓ 公檔有 — ${escapeHtml(correctFab.sub||'')} · ${escapeHtml(correctFab.composition||'')} · ${escapeHtml(correctFab.weight||'')}</span>`;
      correctManual.style.display = 'none';
    } else {
      correctInfo.innerHTML = `<span style="color:var(--or)">⚠ 公檔缺、手填規格給 comment 用</span>`;
      correctManual.style.display = 'block';
    }
  };
  correctRdInp.oninput = checkCorrect;

  const checkSub = () => {
    const raw = subRdInp.value.trim();
    if(!raw){ subInfo.innerHTML = ''; return; }
    const rdK = normalizeRD(raw);
    const f = Store.get('fabric:'+rdK);
    subInfo.innerHTML = f
      ? `<span style="color:var(--gn)">✓ 公檔有 — ${escapeHtml(f.sub||'')} · ${escapeHtml(f.composition||'')} · ${escapeHtml(f.weight||'')}</span>`
      : `<span style="color:var(--or)">⚠ 公檔缺、comment 的 actual 欄會空、之後上傳 .fab 再補</span>`;
  };
  subRdInp.oninput = checkSub;

  recBtn.onclick = () => {
    const pf = {
      sub: cSub.value.trim() || (correctFab && correctFab.sub) || '',
      composition: cComp.value.trim() || (correctFab && correctFab.composition) || '',
      weight: cWeight.value.trim() || (correctFab && correctFab.weight) || '',
      type: correctFab ? correctFab.type : ''
    };
    if(!pf.composition && !pf.weight){ toast('至少要有成分或重量才能推薦','or'); return; }
    const result = findCandidates(pf, 20);
    if(!result.candidates || result.candidates.length === 0){
      recList.style.display = 'block';
      recList.innerHTML = `<div style="font-size:.82em;color:var(--t3);padding:6px">沒有候選、試著自己輸入代用布 RD</div>`;
      return;
    }
    recList.style.display = 'block';
    recList.innerHTML = result.candidates.slice(0,20).map(c => `
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px dashed var(--bd2);font-size:.82em">
        <div><b>${escapeHtml(displayRd(c.fab.rd))}</b> · ${escapeHtml(c.fab.sub||'')} · ${escapeHtml(c.fab.composition||'')} · ${escapeHtml(c.fab.weight||'')}</div>
        <button class="btn s sm" data-ms-pick="${escapeHtml(c.fab.rd)}">選用</button>
      </div>`).join('');
    recList.querySelectorAll('[data-ms-pick]').forEach(b => b.onclick = () => {
      subRdInp.value = displayRd(b.dataset.msPick);
      checkSub();
    });
  };

  document.getElementById('ms-cancel').onclick = () => root.innerHTML = '';
  document.getElementById('ms-ok').onclick = () => {
    const styleKey = styleInp.value.trim();
    if(!styleKey){ toast('款號是必填','or'); return; }
    const correctRaw = correctRdInp.value.trim();
    const correctRd = correctRaw ? normalizeRD(correctRaw) : '';
    const subRaw = subRdInp.value.trim();
    const subRd = subRaw ? normalizeRD(subRaw) : '';
    if(!correctRd && !subRd){ toast('正確布 / 代用布至少要填一個','or'); return; }
    const role = document.querySelector('input[name="ms-role"]:checked').value;
    const manualSpec = (cSub.value.trim() || cComp.value.trim() || cWeight.value.trim() || cWidth.value.trim()) ? {
      sub: cSub.value.trim(), composition: cComp.value.trim(), weight: cWeight.value.trim(), width: cWidth.value.trim()
    } : null;
    let fab;
    if(subRd){
      // 有代用布 → 採用它、正確布(若有)當 originalRd
      fab = { rd: subRd, label:'', originalRd: correctRd || undefined };
      if(!correctFab && manualSpec) fab.originalSpec = manualSpec;
    } else {
      // 只有正確布、沒代用 → 直接設正確布為主布(不是代用關係)
      fab = { rd: correctRd, label:'' };
    }
    let s = Store.get('style:'+styleKey);
    if(!s){
      s = {
        style: styleKey.split('_')[0],
        bom: styleKey.includes('_') ? styleKey.split('_').slice(1).join('_') : '',
        brand: currentBrandKey(), season:'', category:'', description:'',
        mainFabric: null, mainFabric2: null, isSet: isSetCb.checked, accessories: [],
        setBy: State.user.name, setDate: new Date().toLocaleDateString('zh-TW')
      };
    }
    if(role === 'main') s.mainFabric = fab;
    else { s.mainFabric2 = fab; s.isSet = true; }
    s.setBy = State.user.name; s.setDate = new Date().toLocaleDateString('zh-TW');
    Store.set('style:'+styleKey, s);
    addHistory({
      action: subRd && correctRd ? 'commit_substitute' : 'commit_main',
      style: styleKey, rd: fab.rd, original: correctRd || undefined,
      slot: role, source: 'manual_new', actor: State.user.name
    });
    root.innerHTML = '';
    copyCommentForStyle(styleKey, true);
    toast('✓ 已新增此款、comment 已複製','gn');
    State.search.result = { kind:'style', style:Store.get('style:'+styleKey), key:styleKey };
    render();
  };
}

function setAsMainOrAcc(rd, mode){
  const styleKey = prompt(`要把 ${rd} 設為「${mode==='main'?'主布':'配布'}」到哪個款？輸入完整 key (例如 D102978_BOM871681)：`);
  if(!styleKey) return;
  let s = Store.get('style:'+styleKey);
  if(!s){
    if(!confirm(`找不到款 ${styleKey}，要建立新的嗎？`)) return;
    s = {
      style: styleKey.split('_')[0], bom: styleKey.split('_').slice(1).join('_') || '',
      brand: currentBrandKey(), season:'', category:'', description:'',
      mainFabric: null, mainFabric2: null, isSet: false, accessories: [],
      setBy: State.user.name, setDate: new Date().toLocaleDateString('zh-TW')
    };
  }
  if(mode === 'main'){
    s.mainFabric = { rd, label:'' };
    addHistory({ action:'commit_main', style:styleKey, rd, actor:State.user.name });
  } else {
    const label = prompt('配布角色名（例如：褲子、領接、口袋）：', '配布');
    if(!s.accessories) s.accessories = [];
    s.accessories.push({ rd, label: label || '配布' });
    addHistory({ action:'add_accessory', style:styleKey, rd, label, actor:State.user.name });
  }
  s.setBy = State.user.name; s.setDate = new Date().toLocaleDateString('zh-TW');
  Store.set('style:'+styleKey, s);
  toast(`已將 ${rd} 設為 ${styleKey} 的${mode==='main'?'主布':'配布'}`,'gn');
  State.search.result = { kind:'style', style:s, key:styleKey };
  render();
}

function addAccessory(styleKey){
  const rd = prompt('要新增的配布 RD 號：');
  if(!rd) return;
  const rdK = rd.toUpperCase().startsWith('RD#') ? rd.toUpperCase() : 'RD#'+rd.replace(/^RD/i,'');
  const f = Store.get('fabric:'+rdK);
  if(!f){ toast(`公檔沒有 ${rdK}，可能要先通知負責人新增`,'or'); return; }
  const label = prompt('配布角色名：', '配布');
  const s = Store.get('style:'+styleKey);
  if(!s.accessories) s.accessories = [];
  s.accessories.push({ rd:rdK, label: label || '配布' });
  Store.set('style:'+styleKey, s);
  addHistory({ action:'add_accessory', style:styleKey, rd:rdK, label, actor:State.user.name });
  toast('配布已新增','gn');
  State.search.result = { kind:'style', style:s, key:styleKey };
  render();
}

// 統計一塊 RD 在所有款的使用次數
//   asMain   = 當主布的次數
//   asMain2  = 當主布2 (SET 下身) 的次數
//   asAcc    = 當配布的次數
//   asOriginal = 當客人原指定 RD 但被代用的次數
//   styles   = [{ key, role }] 詳細列表
function countRdUsage(rd){
  const stats = { asMain:0, asMain2:0, asAcc:0, asOriginal:0, styles:[] };
  if(!rd) return stats;
  const keys = Store.list('style:');
  for(const k of keys){
    const key = k.startsWith('style:') ? k.slice(6) : k;
    const s = Store.get('style:'+key);
    if(!s) continue;
    if(s.mainFabric && s.mainFabric.rd === rd){
      stats.asMain++;
      stats.styles.push({ key, role:'主布', sub:false });
    }
    if(s.mainFabric2 && s.mainFabric2.rd === rd){
      stats.asMain2++;
      stats.styles.push({ key, role:'主布2 (SET 下身)', sub:false });
    }
    if(s.mainFabric && s.mainFabric.originalRd === rd){
      stats.asOriginal++;
      stats.styles.push({ key, role:'客人原指定 → 代用 '+displayRd(s.mainFabric.rd), sub:true, actualRd:s.mainFabric.rd });
    }
    if(s.mainFabric2 && s.mainFabric2.originalRd === rd){
      stats.asOriginal++;
      stats.styles.push({ key, role:'客人原指定 → 代用 '+displayRd(s.mainFabric2.rd)+' (主布2)', sub:true, actualRd:s.mainFabric2.rd });
    }
    for(const a of (s.accessories || [])){
      if(a.rd === rd){
        stats.asAcc++;
        stats.styles.push({ key, role:'配布'+(a.label?'·'+a.label:''), sub:false });
      }
      if(a.originalRd === rd){
        stats.asOriginal++;
        stats.styles.push({ key, role:'客人原指定 → 代用 '+displayRd(a.rd)+' (配布)', sub:true, actualRd:a.rd });
      }
    }
  }
  return stats;
}

function addHistory(entry){
  const h = Store.get('history') || [];
  h.unshift({
    ts: new Date().toLocaleString('zh-TW',{hour12:false}),
    brand: currentBrandKey(),
    source: 'manual',
    ...entry
  });
  Store.set('history', h.slice(0, 1000));
}

// ============================================================
// UTILS
// ============================================================
function formatSource(s){
  if(!s) return '<span style="color:var(--t3)">未記錄</span>';
  if(s.startsWith('lib:'))  return '🟢 Gap Inc Excel: ' + escapeHtml(s.slice(4));
  if(s.startsWith('scan:')) return '⚪ 公檔新布: ' + escapeHtml(s.slice(5));
  if(s.startsWith('bom:'))  return '🟢 客人 BOM: ' + escapeHtml(s.slice(4));
  return escapeHtml(s);
}

// 合併兩筆 fabric 資料：補洞優先，已填好的欄不蓋。
// source 優先序：lib > bom > scan，高的會覆蓋低的 source 標籤
function mergeFabric(existing, incoming){
  if(!existing) return incoming;
  const merged = { ...existing };
  const fields = ['type','sub','composition','weight','width','shrinkage','supplier','season','spandex','notes','fabLastModified'];
  // scan 的 placeholder 視同空白，任何新資料都可以蓋過
  const oldIsPlaceholder = (existing.source||'').startsWith('scan:');

  for(const k of fields){
    const ex = existing[k];
    const inc = incoming[k];
    const hasEx = ex !== undefined && ex !== null && ex !== '' && !(k === 'spandex' && ex === false);
    const hasInc = inc !== undefined && inc !== null && inc !== '' && !(k === 'spandex' && inc === false);
    if(hasInc && (oldIsPlaceholder || !hasEx)){
      merged[k] = inc;
    }
  }
  // 特殊：spandex 在 incoming 為 true 時要進來
  if(incoming.spandex === true) merged.spandex = true;

  // source 升級邏輯
  const pri = { lib:3, bom:2, scan:1, manual:0 };
  const oldP = pri[(existing.source||'').split(':')[0]] || 0;
  const newP = pri[(incoming.source||'').split(':')[0]] || 0;
  if(newP >= oldP && incoming.source) merged.source = incoming.source;
  return merged;
}

// 從 BOM Excel 解析出的 fabric 資料寫進公檔（補洞用，不覆蓋好資料）
function commitFabricsFromBom(parsedFabrics, sourceFilename){
  if(!Array.isArray(parsedFabrics)) return 0;
  const sourceLabel = 'bom:' + sourceFilename;
  let count = 0;
  parsedFabrics.forEach(pf => {
    if(!pf || !pf.rd) return;
    const incoming = {
      rd: pf.rd,
      brand: null,
      type: pf.type || null,
      sub: pf.sub || '',
      composition: pf.composition || '',
      weight: pf.weight || '',
      width: pf.width || '',
      shrinkage: pf.shrinkage || '',
      supplier: pf.supplier || '',
      season: '',
      spandex: pf.spandex === true,
      notes: '',
      source: sourceLabel
    };
    const existing = Store.get('fabric:'+pf.rd);
    Store.set('fabric:'+pf.rd, mergeFabric(existing, incoming));
    count++;
  });
  return count;
}

function escapeHtml(s){
  if(s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let _toastTimer = null;
function toast(msg, kind){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (kind || '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// INIT
// ============================================================
seedIfEmpty();
applyMigrations();      // pre-pull：先把本機舊格式範本修掉
render();

  if(CloudSync.enabled()){
    await CloudSync.pull();
    applyMigrations();  // post-pull：若雲端也是舊格式、覆寫到本機後，再修一次（會 queue 寫回雲端）
    render();
  }
})();

window.GISFDT = { CONFIG, BRANDS, Store, State, CloudSync, render, performSearch, parseMainCell, applyMigrations };
